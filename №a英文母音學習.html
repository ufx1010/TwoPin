        .vowel-i { color: #10b981; font-weight: 700; } /* 綠色 */
        .vowel-o { color: #f59e0b; font-weight: 700; } /* 橙色 */

    </style>

            </h1>
            <p class="text-slate-500 text-sm md:text-base">

                <span class="px-3 py-1.5 bg-amber-50 text-amber-600 rounded-full border border-amber-200">O / o (橙色)</span>

                            <option value="3">三音節單字</option>
                            <option value="4+">四音節(含)以上單字</option>

                        </button>

                </div>

                </div>

        // 取得系統內建聲音清單

            if (!synth) return;

            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = loadVoices;

        // 音節劃分核心演算法
        function getSyllables(word) {
            word = word.toLowerCase().trim();
            // 排除含有空格的片語 (如 "a few")
            if (word.includes(' ')) {
                return word.split(' ').map(w => getSyllables(w).join('_'));
            }
            if (word.length <= 3) return [word];

            const vowels = 'aeiouy';
            let syllables = [];
            
            // 輔助檢測常見的前綴與後綴以精確劃分
            const suffixes = ['ing', 'ly', 'ment', 'able', 'ible', 'ness', 'less', 'ful', 'tion', 'sion', 'tive', 'age', 'ous', 'est', 'er', 'ed'];
            const prefixes = ['un', 're', 'pre', 'de', 'dis', 'con', 'pro', 'in', 'ex', 'sub'];

            let chars = word.split('');
            let types = chars.map(c => vowels.includes(c) ? 'V' : 'C');

            // 調整字尾不發音的 'e' (如 b_a_k_e)
            if (word.endsWith('e') && !word.endsWith('le') && word.length > 3) {
                types[types.length - 1] = 'c'; // 降級為無聲
            }

            // 尋找母音核心 (Nuclei)
            let nuclei = [];
            for (let i = 0; i < types.length; i++) {
                if (types[i] === 'V') {
                    // 若是連續多個母音，則融合成一個複合母音
                    if (nuclei.length > 0 && nuclei[nuclei.length - 1].end === i - 1) {
                        nuclei[nuclei.length - 1].end = i;
                    } else {
                        nuclei.push({ start: i, end: i });
                    }
                }
            }

            // 單音節單字直接返回
            if (nuclei.length <= 1) return [word];

            // 根據音節核的分布動態切分
            let splitPoints = [];
            for (let k = 0; k < nuclei.length - 1; k++) {
                let start = nuclei[k].end + 1;
                let end = nuclei[k + 1].start - 1;
                let len = end - start + 1;

                if (len === 1) {
                    // VCV 模式 -> 切分為 V-CV (如 ti-ger)
                    splitPoints.push(start);
                } else if (len === 2) {
                    // VCCV 模式 -> 切分為 VC-CV (如 sis-ter)
                    splitPoints.push(start + 1);
                } else if (len >= 3) {
                    // VCCCV 多輔音 -> 切分於首個輔音後
                    splitPoints.push(start + 1);
                } else {
                    // 雙母音無輔音相隔 -> 直接切分 (如 di-et)
                    splitPoints.push(start);
                }
            }

            let result = [];
            let lastIdx = 0;
            splitPoints.forEach(pt => {
                if (pt > lastIdx && pt < word.length) {
                    result.push(word.slice(lastIdx, pt));
                    lastIdx = pt;
                }
            });
            result.push(word.slice(lastIdx));
            return result;
        }

        // 母音上色渲染器
        function highlightVowels(text) {
            return text.replace(/[aeiouAEIOU]/g, (match) => {
                const lower = match.toLowerCase();
                return `<span class="vowel-${lower}">${match}</span>`;
            });
        }

        // 渲染單字清單
        function renderPage() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredWords.slice(start, end);
            const grid = document.getElementById('word-grid');
            
            grid.innerHTML = '';

            if (pageItems.length === 0) {
                grid.innerHTML = `

                document.getElementById('page-info').innerText = '0 / 0';

                document.getElementById('next-page').disabled = true;

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-slate-200 transition-all flex flex-col justify-between relative group";
                
                card.innerHTML = `
                    <button onclick="toggleFav('${item.original}')" class="absolute top-3 right-3 text-slate-300 hover:text-amber-500 transition-colors z-10">
                        <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-star text-amber-500 text-lg"></i>
                    </button>
                    <div>
                        <div class="text-xs font-bold text-indigo-500 bg-indigo-50 px-2.5 py-1 rounded-full w-max mb-3">
                            ${item.syllablesCount} 音節
                        </div>
                        <h3 class="text-2xl font-bold tracking-wide text-slate-900 mb-1 leading-tight">
                            ${highlightVowels(item.joined)}
                        </h3>
                        <p class="text-slate-500 text-sm font-medium pr-6 ${hideChinese ? 'opacity-0 hover:opacity-100 transition-opacity duration-200' : ''}">
                            ${item.translation}
                        </p>
                    </div>
                    <div class="mt-4 flex items-center justify-between border-t pt-3">
                        <span class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">${item.original}</span>
                        <button onclick="speak('${item.original}')" class="text-slate-400 hover:text-indigo-600 transition-colors p-1.5 rounded-lg hover:bg-slate-50">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);

            // 更新分頁資訊
            const totalPages = Math.ceil(filteredWords.length / itemsPerPage);
            document.getElementById('page-info').innerText = `頁面 ${currentPage} / ${totalPages || 1} (共 ${filteredWords.length} 字)`;
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = currentPage === totalPages || totalPages === 0;

        // 篩選與搜尋
        function filterWords() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const syllableFilter = document.getElementById('syllable-select').value;

            filteredWords = processedWords.filter(item => {
                const matchesSearch = item.original.includes(query) || item.translation.includes(query);
                
                let matchesSyllable = true;
                if (syllableFilter !== 'all') {
                    if (syllableFilter === '4+') {
                        matchesSyllable = item.syllablesCount >= 4;
                    } else {
                        matchesSyllable = item.syllablesCount === parseInt(syllableFilter);
                    }
                }

                const matchesFav = !showFavoritesOnly || favorites.has(item.original);
                const matchesLetter = activeLetter === 'all' || item.original.startsWith(activeLetter);

                return matchesSearch && matchesSyllable && matchesFav && matchesLetter;
            });

            currentPage = 1;
            renderPage();
        }

        }

        function toggleShowFavorites() {
            showFavoritesOnly = !showFavoritesOnly;
            const btn = document.getElementById('fav-filter-btn');
            if (showFavoritesOnly) {
                btn.className = "flex-1 py-2.5 rounded-xl border border-indigo-200 bg-indigo-50 text-indigo-700 transition-colors text-sm font-bold flex items-center justify-center gap-2";
            } else {
                btn.className = "flex-1 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors text-sm font-medium flex items-center justify-center gap-2";
            }
            filterWords();
        }

        function toggleHideChinese() {
            hideChinese = !hideChinese;
            const btn = document.getElementById('hide-chinese-btn');
            if (hideChinese) {
                btn.className = "flex-1 py-2.5 rounded-xl border border-indigo-200 bg-indigo-50 text-indigo-700 transition-colors text-sm font-bold flex items-center justify-center gap-2";
            } else {
                btn.className = "flex-1 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors text-sm font-medium flex items-center justify-center gap-2";
            }
            renderPage();
        }

        // 手機專用強效發音功能（優先真人字典與行動媒體串流）
        async function speak(text) {
            text = text.toLowerCase().trim();

            // 1. 優先：嘗試取得線上字典真人發音 (音質最好，且能跳過所有 Web Speech API iframe 鎖定限制)
            try {
                // 如果是片語，不走字典 api 直跳 Google 串流
                if (!text.includes(' ')) {
                    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(text)}`);
                    if (response.ok) {
                        const data = await response.json();
                        const phonetics = data[0]?.phonetics || [];
                        const audioUrl = phonetics.find(p => p.audio && p.audio.length > 0)?.audio;
                        if (audioUrl) {
                            const audio = new Audio(audioUrl);
                            audio.play();
                            return; // 播放成功即結束
                        }
                    }
                }
            } catch (e) {
                console.log("Dictionary API 連線失敗，啟用 Google TTS 媒體流備用方案。");
            }

            // 2. 次優：Google TTS 行動端媒體流方案 (以標準 HTML Audio 元件播放，iOS / Android 支援度極高)
            try {
                const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(text)}`;
                const audio = new Audio(ttsUrl);
                audio.play();
            } catch (e) {
                console.log("Google 串流播放受限，切換至本地語音引擎補償方案。");
                // 3. 墊底：手機內建本地 SpeechSynthesis
                fallbackLocalSpeak(text);
            }
        }

        // 系統內建語音補償發音
        function fallbackLocalSpeak(text) {
            if (!synth) {
                showToast("您的裝置不支援發音功能");
                return;
            }
            synth.cancel();
            if (synth.paused) {
                synth.resume();
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85;
            utterance.lang = 'en-US';
            synth.speak(utterance);
        }

        // Toast 彈出訊息
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.className = toast.className.replace('translate-y-20 opacity-0', 'translate-y-0 opacity-100');
            setTimeout(() => {
                toast.className = toast.className.replace('translate-y-0 opacity-100', 'translate-y-20 opacity-0');
            }, 2500);
        }

        // 籤頁切換
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn px-6 py-2.5 rounded-full font-bold text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-100";
            });
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.className = "tab-btn px-6 py-2.5 rounded-full font-bold text-sm transition-all shadow-sm bg-indigo-600 text-white";

            if (tabId === 'quiz') {
                setupQuiz();
            } else if (tabId === 'flashcards') {
                setupFlashcards();
            }
        }

        /* 記憶閃卡模式模組 */
        function setupFlashcards() {
            flashcardIndex = 0;
            updateFlashcard();
        }

        function updateFlashcard() {
            if (filteredWords.length === 0) {
                document.getElementById('card-front-word').innerHTML = "目前無相符單字";
                document.getElementById('card-back-translation').innerHTML = "請先調整篩選器";
                document.getElementById('card-index').innerText = "0 / 0";
                return;
            }
            const item = filteredWords[flashcardIndex];
            document.getElementById('card-front-word').innerHTML = highlightVowels(item.joined);
            document.getElementById('card-back-translation').innerText = item.translation;
            document.getElementById('card-index').innerText = `${flashcardIndex + 1} / ${filteredWords.length}`;
            updateCardFavoriteIcon();
            
            // 重置翻面狀態為正面
            const inner = document.getElementById('flashcard-inner');
            inner.style.transform = '';
        }

        function flipCard() {
            const inner = document.getElementById('flashcard-inner');
            if (inner.style.transform === 'rotateY(180deg)') {
                inner.style.transform = '';
            } else {
                inner.style.transform = 'rotateY(180deg)';
            }
        }

        function nextCard() {
            if (filteredWords.length === 0) return;
            flashcardIndex = (flashcardIndex + 1) % filteredWords.length;
            updateFlashcard();
        }

        function prevCard() {
            if (filteredWords.length === 0) return;
            flashcardIndex = (flashcardIndex - 1 + filteredWords.length) % filteredWords.length;
            updateFlashcard();
        }

        function toggleCardFavorite() {
            if (filteredWords.length === 0) return;
            const item = filteredWords[flashcardIndex];
            toggleFav(item.original);
        }

        function updateCardFavoriteIcon() {
            if (filteredWords.length === 0) return;
            const item = filteredWords[flashcardIndex];
            const icon = document.getElementById('card-fav-icon');
            if (favorites.has(item.original)) {
                icon.className = "fa-solid fa-star text-xl text-amber-500";
            } else {
                icon.className = "fa-regular fa-star text-xl text-amber-500";
            }
        }

        function speakCurrentWord() {
            if (filteredWords.length === 0) return;
            speak(filteredWords[flashcardIndex].original);
        }


        /* 拼字挑戰模組 */
        function setupQuiz() {
            if (filteredWords.length === 0) {
                document.getElementById('quiz-chinese').innerText = "無篩選資料";
                return;
            }
            // 隨機選一個目前的篩選結果
            quizCurrentWord = filteredWords[Math.floor(Math.random() * filteredWords.length)];
            document.getElementById('quiz-chinese').innerText = quizCurrentWord.translation;
            document.getElementById('quiz-input').value = '';
            document.getElementById('quiz-feedback').className = "mt-6 p-4 rounded-xl hidden text-center font-bold";
            
            // 初始化字元與提示格
            const container = document.getElementById('quiz-hint-container');
            container.innerHTML = '';
            
            // 提示總字元長度
            const len = quizCurrentWord.original.length;
            for(let i=0; i<len; i++) {
                if (quizCurrentWord.original[i] === ' ') {
                    container.innerHTML += `<span class="mx-1 text-slate-300"> </span>`;
                } else if (quizCurrentWord.original[i] === '-') {
                    container.innerHTML += `<span class="mx-0.5 text-slate-400">-</span>`;
                } else {
                    container.innerHTML += `<span class="border-b-2 border-slate-300 w-5 text-center block text-sm select-none">_</span>`;
                }
            }
        }

        function revealQuizHint() {
            if (!quizCurrentWord) return;
            const container = document.getElementById('quiz-hint-container');
            // 直接顯示帶有音節拆分的底線提示
            container.innerHTML = `<span class="text-sm text-indigo-500 tracking-wider">${highlightVowels(quizCurrentWord.joined)}</span>`;
        }

        function checkQuizAnswer() {
            if (!quizCurrentWord) return;
            const userInput = document.getElementById('quiz-input').value.toLowerCase().trim();
            const correctWord = quizCurrentWord.original.toLowerCase().trim();
            const feedback = document.getElementById('quiz-feedback');

            feedback.classList.remove('hidden');

            if (userInput === correctWord) {
                feedback.className = "mt-6 p-4 rounded-xl text-center font-bold bg-emerald-50 text-emerald-800 border border-emerald-200";
                feedback.innerHTML = `🎉 太棒了！答對了！<br><span class="text-xs text-emerald-600">${quizCurrentWord.original} : ${quizCurrentWord.translation}</span>`;
                quizScore += 10;
                document.getElementById('quiz-score').innerText = `積分：${quizScore}`;
                speak(quizCurrentWord.original);
                
                // 1.8 秒後自動進入下一題
                setTimeout(setupQuiz, 1800);
            } else {
                feedback.className = "mt-6 p-4 rounded-xl text-center font-bold bg-rose-50 text-rose-800 border border-rose-200";
                feedback.innerHTML = `❌ 拼法有點不對唷，再試一次吧！`;
            }
        }

        function handleQuizKeyDown(event) {
            if (event.key === 'Enter') {
                checkQuizAnswer();
            }
        }

        // 啟動系統
        window.onload = init;
    </script>
</body>
</html>
