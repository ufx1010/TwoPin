<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1f4d44">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="單字配對遊戲">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231f4d44' width='192' height='192'/><text x='96' y='120' font-size='80' font-weight='bold' fill='%23e0654f' text-anchor='middle' font-family='Arial'>♠</text></svg>">
<title>多國語言單字配對遊戲 - 坦米爾語版</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght=600;700&family=Patrick+Hand&family=Schoolbell&family=Architects+Daughter&family=Short+Stack&family=Fredoka+One&family=Nunito:wght=700;800&display=swap" rel="stylesheet">
<style>
:root{
 --en-font-family:'Patrick Hand',cursive;
 --primary:#1f4d44; --primary-dark:#163d35; --primary-light:#2c6358; --accent:#e0654f;
 --bg:#f5f0e8; --card:#fffdf6; --text:#22302c;
 --vowel-a:#ff1a1a; --vowel-e:#00c853; --vowel-i:#2979ff; --vowel-o:#ff6d00; --vowel-u:#d500f9;
 --good:#5fc78a; --bad:#e0654f; --shadow:0 10px 30px rgba(0,0,0,0.3);
 --en-card-size: 1.0;
 --zh-card-size: 1.3;
}
body.dark-mode {
 --primary:#0f2b28; --primary-dark:#0a1e1c; --primary-light:#1a4540; --accent:#ff7a5c;
 --bg:#1a1f1e; --card:#2a3232; --text:#e0ddd8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter','Noto Sans TC',sans-serif;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 50%,var(--primary-light) 100%);min-height:100vh;padding:12px;color:var(--text);transition:background 0.3s;}
.container{max-width:900px;margin:0 auto;}
header{text-align:center;color:#f4ecd8;margin-bottom:15px;}
header .subtitle{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.9;margin-bottom:5px;}
header h1{font-family:'Caveat',cursive;font-size:clamp(28px,8vw,44px);margin:0;line-height:1.1;}
header h1 .accent{color:var(--accent);}
.top-controls{display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px;}
.theme-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#f4ecd8;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.theme-btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.05);}
.hud{display:flex;justify-content:center;gap:8px;margin-bottom:15px;flex-wrap:wrap;}
.pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 14px;color:#f4ecd8;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.pill .dot{width:8px;height:8px;border-radius:50%;}
.pill.timer .dot{background:#e8b339;} .pill.matched .dot{background:var(--good);}
.quit-btn{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#f4ecd8;border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;font-weight:600;}
.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:15px;position:relative;transition:background 0.3s;}
.card::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff7d6,#e8b339 60%,#b98525);}
.card h2{font-family:'Noto Sans TC',sans-serif;font-size:22px;margin:10px 0 15px;color:var(--text);}
.section-title{font-size:13px;font-weight:700;color:#7a8278;text-transform:uppercase;letter-spacing:0.08em;margin:15px 0 10px;}
body.dark-mode .section-title{color:#9ba89f;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px;}
.btn{flex:1;min-width:70px;padding:10px 12px;border:2px solid #e8dfc7;border-radius:12px;background:#fbf8ee;font-family:'Inter','Noto Sans TC',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;}
body.dark-mode .btn{background:#3a4242;border-color:#4a5555;color:#e0ddd8;}
.btn:hover{transform:translateY(-2px);} .btn:active{transform:scale(0.96);}
.btn.active{background:var(--primary);color:#f4ecd8;border-color:var(--primary);}
.btn.small{padding:6px 10px;font-size:11px;min-width:40px;}
.font-dropdown{margin-bottom:15px;}
.font-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:2px solid #e8dfc7;border-radius:12px;background:#fbf8ee;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;}
body.dark-mode .font-header{background:#3a4242;border-color:#4a5555;color:#e0ddd8;}
.font-header .arrow{transition:transform 0.2s;}
.font-header.open .arrow{transform:rotate(180deg);}
.font-grid{display:none;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.font-grid.open{display:grid;}
.font-btn{padding:10px 6px;border:2px solid #e8dfc7;border-radius:12px;background:#fbf8ee;font-weight:700;font-size:11px;cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.3;}
body.dark-mode .font-btn{background:#3a4242;border-color:#4a5555;color:#e0ddd8;}
.font-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px;}
@media(min-width:600px){.board{grid-template-columns:repeat(4,1fr);}}
.game-card{aspect-ratio:1;background:var(--card);border-radius:12px;border:2px solid #e8dfc7;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;cursor:pointer;text-align:center;transition:all 0.15s;}
.game-card:hover{transform:translateY(-3px);}
.game-card.selected{background:#fff3b0;border-color:#c98a00;border-width:3px;animation:flash-border 1s infinite;transform:scale(1.05);}
body.dark-mode .game-card.selected{background:#4a5f20;}
@keyframes flash-border{0%, 100% { box-shadow: 0 0 0 4px rgba(232,179,57,0.4), 0 8px 20px rgba(0,0,0,0.2); }50% { box-shadow: 0 0 0 8px rgba(232,179,57,0.1), 0 8px 20px rgba(0,0,0,0.2); background: #fffaf0; }}
.game-card.correct{background:#e3f9ee;border-color:var(--good);animation:pop 0.3s;}
body.dark-mode .game-card.correct{background:#2a4a35;}
.game-card.wrong{background:#fde7e2;border-color:var(--bad);animation:shake 0.4s;}
body.dark-mode .game-card.wrong{background:#4a2a25;}
.game-card.cleared{opacity:0;visibility:hidden;transform:scale(0.5) rotate(180deg);pointer-events:none;}
.game-card.diagonal{transform:rotate(-15deg);}
.game-card.diagonal.selected,.game-card.diagonal.correct{transform:rotate(-15deg) scale(1.05);}
.game-card .text{font-size:clamp(13px,3.5vw,18px);font-weight:700;line-height:1.3;word-break:break-word;width:100%;pointer-events:none;}
.game-card .phonetic{font-size:clamp(11px,2.8vw,14px);color:#666;font-family:'Noto Serif',serif;margin-top:2px;pointer-events:none;user-select:none;-webkit-user-select:none;}
body.dark-mode .game-card .phonetic{color:#aaa;}
.game-card.en .text{font-family:var(--en-font-family);font-size:calc(clamp(16px,4vw,24px) * var(--en-card-size));font-weight:400;}
.game-card.zh .text{font-family:'Noto Sans TC',sans-serif;font-size:calc(clamp(13px,3.5vw,18px) * var(--zh-card-size));font-weight:700;}
.game-card .speaker{position:absolute;bottom:4px;right:6px;font-size:10px;opacity:0.4;pointer-events:none;}
.v-a{color:var(--vowel-a);font-weight:800;} .v-e{color:var(--vowel-e);font-weight:800;} .v-i{color:var(--vowel-i);font-weight:800;} .v-o{color:var(--vowel-o);font-weight:800;} .v-u{color:var(--vowel-u);font-weight:800;}
.start-btn{width:100%;padding:16px;border:none;border-radius:15px;background:linear-gradient(180deg,var(--primary-light),var(--primary));color:#f4ecd8;font-family:'Inter','Noto Sans TC',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.2s;}
.start-btn:hover{transform:translateY(-2px);} .start-btn:active{transform:scale(0.98);}
.control-btns{display:flex;gap:8px;margin-top:15px;flex-wrap:wrap;}
.control-btn{flex:1;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#f4ecd8;font-family:'Inter','Noto Sans TC',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s;min-width:120px;}
.control-btn:hover{transform:translateY(-2px);} .control-btn.secondary{background:#2c5f55;}
.custom-panel{display:none;margin-top:12px;padding:12px;background:#f5f0e8;border-radius:12px;border:2px dashed #e8dfc7;transition:all 0.3s;}
body.dark-mode .custom-panel{background:#2a3232;border-color:#4a5555;}
.custom-panel.open{display:block;}
.custom-textarea{width:100%;min-height:80px;padding:10px;border:2px solid #e8dfc7;border-radius:8px;background:#fffdf6;font-family:'Inter',sans-serif;font-size:12px;line-height:1.6;resize:vertical;transition:all 0.3s;}
body.dark-mode .custom-textarea{background:#3a4242;border-color:#4a5555;color:#e0ddd8;}
.custom-hint{font-size:11px;color:#7a8278;margin-bottom:8px;line-height:1.4;}
body.dark-mode .custom-hint{color:#9ba89f;}
.custom-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.custom-count{flex:1;font-size:11px;color:#7a8278;}
body.dark-mode .custom-count{color:#9ba89f;}
.voice-input-container {margin:15px 0;padding:12px;background:#f5f0e8;border-radius:12px;border:2px solid #e8dfc7;display:flex;gap:8px;align-items:center;position:relative;transition:all 0.3s;}
body.dark-mode .voice-input-container{background:#2a3232;border-color:#4a5555;}
.voice-input-wrapper{flex:1;position:relative;display:flex;align-items:center;}
.voice-input{width:100%;padding:10px 50px 10px 12px;border:2px solid #d4c9b3;border-radius:8px;background:#fff;font-family:'Inter','Noto Sans TC',sans-serif;font-size:15px;font-weight:600;color:var(--text);transition:all 0.3s;}
body.dark-mode .voice-input{background:#3a4242;border-color:#5a6666;color:#e0ddd8;}
.voice-input:focus{border-color:var(--primary);}
.voice-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s;flex-shrink:0;}
.mic-btn{background:var(--accent);color:white;}
.mic-btn.recording{background:#ff1a1a;animation:pulse-red 1s infinite;}
@keyframes pulse-red{0%,100%{transform:scale(1);}50%{transform:scale(1.1);box-shadow:0 0 15px rgba(255,26,26,0.6);}}
.lang-btn{background:#4f8fe0;color:white;font-size:12px;font-weight:700;min-width:44px;padding:0 4px;}
.submit-btn{background:var(--primary);color:white;}
.submit-btn:active{transform:scale(0.95);}
.note{font-size:11px;color:#8b9389;text-align:center;margin-top:8px;}
body.dark-mode .note{color:#9ba89f;}
.hidden{display:none!important;}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,20,18,0.85);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px);}
.modal.active{display:flex;}
.modal-content{background:var(--card);border-radius:20px;padding:30px 24px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);transition:all 0.3s;}
.modal-content h2{font-family:'Noto Sans TC',sans-serif;font-size:26px;margin-bottom:20px;color:var(--text);}
.results{display:flex;justify-content:center;gap:20px;margin-bottom:20px;}
.result-item{background:#fbf8ee;border-radius:12px;padding:14px 20px;transition:all 0.3s;}
body.dark-mode .result-item{background:#3a4242;}
.result-item b{display:block;font-size:22px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums;}
.result-item span{font-size:11px;color:#7a8278;text-transform:uppercase;letter-spacing:0.05em;}
body.dark-mode .result-item span{color:#9ba89f;}
.modal-buttons{display:flex;gap:8px;}
.modal-buttons button{flex:1;padding:12px;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;transition:transform 0.15s;}
.modal-buttons button:active{transform:scale(0.96);}
.btn-home{background:#eee7d4;color:var(--text);} .btn-retry{background:var(--primary);color:#f4ecd8;}
body.dark-mode .btn-home{background:#3a4242;color:#e0ddd8;}

.toast-container {position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 500px;}
.toast {
  background: var(--card); 
  color: var(--text); 
  border: 3px solid var(--accent); 
  padding: 16px 24px; 
  border-radius: 16px; 
  box-shadow: var(--shadow); 
  text-align: center;
  cursor: pointer; 
  animation: slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition:all 0.3s;
}
.toast.success-toast { border-color: var(--good); }
.toast.web-toast { border-color: #4f8fe0; }
.toast.error-toast { border-color: var(--bad); background: #fde7e2; }
body.dark-mode .toast.error-toast{background:#4a2a25;}
.toast-input-line { font-size: 20px; font-weight: 800; color: var(--text); word-break: break-all; }
.toast-trans-line { font-size: 16px; font-weight: 700; color: #666; border-top: 1px dashed #ddd; padding-top: 6px; word-break: break-all; }
body.dark-mode .toast-trans-line{border-top-color:#555;}
.toast.success-toast .toast-trans-line { color: var(--good); }
.toast.web-toast .toast-trans-line { color: #4f8fe0; }
.toast.error-toast .toast-trans-line { color: var(--bad); }
@keyframes slideDown {from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; }}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
 <div class="top-controls">
   <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切換深色模式">🌙</button>
 </div>
 <header>
   <div class="subtitle">Word Match Game</div>
   <h1>多國語言<span class="accent">單字配對</span>遊戲</h1>
 </header>
 <div id="startScreen" class="card">
   <h2>開始挑戰</h2>
   <div class="note">目前系統共 <b id="totalWords">0</b> 個單字可抽取。</div>
   <div class="section-title">選擇字型</div>
   <div class="font-dropdown">
     <div class="font-header" onclick="toggleFontGrid()">
       <span id="currentFontName">ABC 手寫1</span>
       <span class="arrow">▾</span>
     </div>
     <div class="font-grid" id="fontGrid">
       <button class="font-btn active" data-font="ABC 手寫1">ABC<br>手寫1</button>
       <button class="font-btn" data-font="ABC 手寫2">ABC<br>手寫2</button>
       <button class="font-btn" data-font="ABC 手寫3">ABC<br>手寫3</button>
       <button class="font-btn" data-font="ABC 手寫4">ABC<br>手寫4</button>
       <button class="font-btn" data-font="ABC 手寫5">ABC<br>手寫5</button>
       <button class="font-btn" data-font="ABC 圓潤">ABC<br>圓潤</button>
       <button class="font-btn" data-font="ABC 圓黑">ABC<br>圓黑</button>
       <button class="font-btn" data-font="ABC 現代">ABC<br>現代</button>
       <button class="font-btn" data-font="ABC 系統">ABC<br>系統</button>
     </div>
   </div>
   
   <div class="section-title">坦米爾文註解大小 (第一區)</div>
   <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
     <span style="font-size: 12px; color:#7a8278;">A-</span>
     <input type="range" id="enSizeRange" min="0.5" max="4.0" step="0.1" value="1.0" style="flex:1;" oninput="updateFontSize('en', this.value)">
     <span style="font-size: 24px; color:#7a8278;">A+</span>
   </div>

   <div class="section-title">中文文字大小 (第二區)</div>
   <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
     <span style="font-size: 12px; color:#7a8278;">A-</span>
     <input type="range" id="zhSizeRange" min="0.5" max="4.0" step="0.1" value="1.3" style="flex:1;" oninput="updateFontSize('zh', this.value)">
     <span style="font-size: 24px; color:#7a8278;">A+</span>
   </div>

   <div class="section-title">選擇單字數量</div>
   <div class="btn-group">
     <button class="btn active" data-count="6">6</button>
     <button class="btn" data-count="12">12</button>
     <button class="btn" data-count="21">21</button>
   </div>
   <button class="start-btn" onclick="startGame()">開始遊戲 ▶</button>
   <div class="control-btns">
     <button class="control-btn secondary" onclick="toggleCustomWords()">＋ 自訂單字／各國語言片語 ▾</button>
   </div>
   <div id="customPanel" class="custom-panel">
     <div class="custom-hint">
       每行一個，格式：<code>第一區文字(中文) | 第二區註解(坦米爾文) | [第三區註解/不發音]</code>
     </div>
     <textarea class="custom-textarea" id="customWords" placeholder="關於 💡 | பற்றி | [பற்றி]"></textarea>
     <div class="custom-actions">
       <button class="btn small" onclick="clearCustomWords()">清除</button>
       <span class="custom-count"><span id="customCount">0</span> 個自訂項目</span>
       <label style="font-size:11px;display:flex;align-items:center;gap:4px;cursor:pointer;">
         <input type="checkbox" id="onlyCustom" onchange="updateCustomOnly()">
         只用自訂單字
       </label>
     </div>
   </div>
 </div>
 <div id="gameScreen" class="hidden">
   <div class="hud">
     <div class="pill timer"><span class="dot"></span><span id="timer">00:00</span></div>
     <div class="pill matched"><span class="dot"></span><span id="matched">0</span> 對</div>
     <button class="quit-btn" onclick="endGame()">結束 ✕</button>
   </div>
   <div class="voice-input-container">
     <button class="voice-btn mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
     <button class="voice-btn lang-btn" id="langBtn" onclick="toggleLang()">繁中</button>
     <div class="voice-input-wrapper">
       <input type="text" class="voice-input" id="voiceInput" placeholder="點擊輸入框打字..." autocomplete="off">
     </div>
     <button class="voice-btn submit-btn" onclick="submitInput()">➤</button>
   </div>
   <div class="board" id="board"></div>
 </div>
 <div id="endModal" class="modal">
   <div class="modal-content">
     <h2>🎉 完成！</h2>
     <div class="results">
       <div class="result-item"><b id="resTime">00:00</b><span>完成秒數</span></div>
       <div class="result-item"><b id="resMatched">0</b><span>配對數量</span></div>
     </div>
     <div class="modal-buttons" style="margin-top:10px;">
       <button class="btn-home" onclick="goHome()">回首頁</button>
       <button class="btn-retry" onclick="retry()">再玩一次</button>
     </div>
   </div>
 </div>
</div>
<script>
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.log('SW 註冊失敗:', err));
}

const STORAGE_KEYS = {
  theme: 'twopin_theme',
  font: 'twopin_font',
  enSize: 'twopin_enSize',
  zhSize: 'twopin_zhSize',
  count: 'twopin_count',
  customWords: 'twopin_customWords',
  onlyCustom: 'twopin_onlyCustom'
};

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem(STORAGE_KEYS.theme, isDark ? 'dark' : 'light');
  updateThemeBtn();
}

function updateThemeBtn() {
  const btn = document.getElementById('themeBtn');
  btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
}

function loadTheme() {
  const saved = localStorage.getItem(STORAGE_KEYS.theme);
  if(saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.body.classList.add('dark-mode');
  }
  updateThemeBtn();
}

function saveState() {
  localStorage.setItem(STORAGE_KEYS.font, state.font);
  localStorage.setItem(STORAGE_KEYS.enSize, document.getElementById('enSizeRange').value);
  localStorage.setItem(STORAGE_KEYS.zhSize, document.getElementById('zhSizeRange').value);
  localStorage.setItem(STORAGE_KEYS.count, state.count);
  localStorage.setItem(STORAGE_KEYS.customWords, document.getElementById('customWords').value);
  localStorage.setItem(STORAGE_KEYS.onlyCustom, document.getElementById('onlyCustom').checked);
}

function playBeepSound() { try { const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.value = 440; gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1); } catch(e){} }

function showPureToast(inputText, translationText, type) { 
  const container = document.getElementById('toastContainer'); 
  const toast = document.createElement('div'); 
  toast.className = `toast ${type === 'success' ? 'success-toast' : (type === 'web' ? 'web-toast' : (type === 'error' ? 'error-toast' : ''))}`; 
  
  const inputLine = document.createElement('div');
  inputLine.className = 'toast-input-line';
  inputLine.textContent = inputText;
  
  const transLine = document.createElement('div');
  transLine.className = 'toast-trans-line';
  transLine.textContent = translationText;
  
  toast.appendChild(inputLine);
  toast.appendChild(transLine);
  
  toast.onclick = () => { if (toast.parentNode === container) container.removeChild(toast); };
  container.appendChild(toast); 
  
  setTimeout(() => { if (toast.parentNode === container) container.removeChild(toast); }, 15000); 
}

function clearAllToasts() { const container = document.getElementById('toastContainer'); if (container) container.innerHTML = ''; }
function init(){ loadTheme(); initFontButtons(); initCountButtons(); const customWordsEl = document.getElementById('customWords'); customWordsEl.addEventListener('input', () => { state.customWords = parseCustomWords(); updateCustomCount(); updateTotalWords(); saveState(); }); loadState(); updateTotalWords(); }
function toggleFontGrid(){ document.getElementById('fontGrid').classList.toggle('open'); document.querySelector('.font-header').classList.toggle('open'); }
function initFontButtons(){ document.querySelectorAll('#fontGrid .font-btn').forEach(b=>{ b.onclick=()=>{ document.querySelectorAll('#fontGrid .font-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); state.font = b.dataset.font; document.documentElement.style.setProperty('--en-font-family', FONT_MAP[state.font]); document.getElementById('currentFontName').textContent = state.font; saveState(); } }); }
function initCountButtons(){ document.querySelectorAll('[data-count]').forEach(b=>{ b.onclick=()=>{ document.querySelectorAll('[data-count]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); state.count = parseInt(b.dataset.count); saveState(); } }); }
function updateTotalWords(){ document.getElementById('totalWords').textContent = filterVocabulary().length; }
function filterVocabulary(){ if (state.onlyCustom) return [...state.customWords]; return [...BASE_VOCABULARY, ...state.customWords]; }
function toggleCustomWords(){document.getElementById('customPanel').classList.toggle('open');}
function clearCustomWords(){document.getElementById('customWords').value='';state.customWords=[];updateCustomCount();updateTotalWords();saveState();}
function updateCustomOnly(){state.onlyCustom=document.getElementById('onlyCustom').checked;updateTotalWords();saveState();}
function updateCustomCount(){document.getElementById('customCount').textContent=state.customWords.length;}

function parseCustomWords(){ 
  const text=document.getElementById('customWords').value.trim(); 
  if(!text)return[]; 
  return text.split('\n').filter(l=>l.trim()).map(line=>{ 
    const parts=line.split('|').map(p=>p.trim()); 
    let zh=parts[0]||'', en=parts[1]||'', phonetic=parts[2]||''; 
    zh=zh.replace(/\[.*?\]/g,'').trim();
    en=en.replace(/\[.*?\]/g,'').trim(); 
    if(!phonetic){const m=line.match(/\[(.*?)\]/);if(m)phonetic=`[${m[1]}]`;} 
    return{zh,en,phonetic}; 
  }).filter(w=>w.zh&&w.en); 
}

function startGame(){ 
  state.customWords=parseCustomWords(); 
  updateCustomCount(); 
  state.allWords = filterVocabulary(); 
  if(state.allWords.length===0){showPureToast('無單字數據','請新增單字', 'error');return;} 
  state.usedWordZh = new Set(); 
  state.boardCards = []; 
  const initialPool = state.allWords.sort(()=>Math.random()-0.5).slice(0,state.count); 
  initialPool.forEach(w => { 
    state.usedWordZh.add(w.zh); 
    state.boardCards.push({type:'zh',text:w.zh,word:w},{type:'en',text:w.en,phonetic:w.phonetic,word:w}); 
  }); 
  state.matched=0; 
  state.time=0; 
  state.selected=null; 
  document.getElementById('startScreen').classList.add('hidden'); 
  document.getElementById('gameScreen').classList.remove('hidden'); 
  document.getElementById('matched').textContent='0'; 
  document.getElementById('timer').textContent='00:00'; 
  document.getElementById('voiceInput').value = ''; 
  document.getElementById('langBtn').textContent = VOICE_LANGS[currentLangIndex].label; 
  
  renderBoard(); 
  state.timerId=setInterval(()=>{ 
    state.time++; 
    document.getElementById('timer').textContent=`${String(Math.floor(state.time/60)).padStart(2,'0')}:${String(state.time%60).padStart(2,'0')}`; 
  },1000); 
}

function renderBoard(){ 
  const b=document.getElementById('board'); 
  b.innerHTML=''; 
  state.boardCards.sort(()=>Math.random()-0.5).forEach((cardData,index)=>{ 
    cardData.diagonal=Math.random()>0.7; 
    const d=document.createElement('div'); 
    d.className=`game-card ${cardData.type}${cardData.diagonal?' diagonal':''}`; 
    d.setAttribute('data-index', index); 
    let t=cardData.text; 
    if(cardData.type==='en') t=highlightVowels(t); 
    d.innerHTML=`<div class="text">${t}</div>${(cardData.phonetic && cardData.type==='en')?`<div class="phonetic">${cardData.phonetic}</div>`:''}<div class="speaker">🔊</div>`; 
    d.onclick=(e)=>handleCardClick(e,d,cardData); 
    b.appendChild(d); 
    cardData.dom = d; 
    cardData.index = index; 
  }); 
}

function highlightVowels(w){ 
  return w.split('').map(c=>{ 
    const l=c.toLowerCase(); 
    if('aeiou'.includes(l)) return `<span class="v-${l}">${c}</span>`; 
    return c; 
  }).join(''); 
}

function handleCardClick(e,cardDom,cardData){ 
  if(e){e.preventDefault(); e.stopPropagation();} 
  if(cardDom.classList.contains('cleared') || cardDom.classList.contains('correct'))return; 
  if(!state.isRecording && 'speechSynthesis' in window){ 
    window.speechSynthesis.cancel(); 
    if(state.soundEnabled) {
      if(cardData.type === 'zh') {
        const cleanZh = cardData.word.zh.replace(/[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim();
        speak(cleanZh, 'zh-TW');
      } else {
        const cleanEn = cardData.word.en.replace(/[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim();
        speak(cleanEn, 'ta-IN');
      }
    }
  } 
  if(state.selected && state.selected.card === cardDom){ cardDom.classList.remove('selected'); state.selected = null; return; } 
  if(!state.selected){ 
    state.selected={card: cardDom, cardData}; 
    cardDom.classList.add('selected'); 
  }else{ 
    const f=state.selected, s={card: cardDom, cardData}; 
    if(f.cardData.type!==s.cardData.type && f.cardData.word.zh===s.cardData.word.zh){ 
      f.card.classList.remove('selected'); 
      f.card.classList.add('correct'); 
      s.card.classList.add('correct'); 
      state.matched++; 
      document.getElementById('matched').textContent=state.matched; 
      state.selected=null; 
      setTimeout(()=>{ shiftAndRefill(f.card, s.card); },400); 
    }else{ 
      f.card.classList.remove('selected'); 
      f.card.classList.add('wrong'); 
      s.card.classList.add('wrong'); 
      setTimeout(()=>{f.card.classList.remove('wrong');s.card.classList.remove('wrong');},400); 
      state.selected=null; 
    } 
  } 
}

function shiftAndRefill(firstDom, secondDom) { 
  const board = document.getElementById('board'); 
  state.boardCards = state.boardCards.filter(c => c.dom !== firstDom && c.dom !== secondDom); 
  let available = state.allWords.filter(w => !state.usedWordZh.has(w.zh)); 
  if (available.length === 0) { 
    state.usedWordZh.clear(); 
    state.boardCards.forEach(c => state.usedWordZh.add(c.word.zh)); 
    available = state.allWords.filter(w => !state.usedWordZh.has(w.zh)); 
  } 
  if (available.length > 0) { 
    available.sort(() => Math.random() - 0.5); 
    const newWord = available[0]; 
    state.usedWordZh.add(newWord.zh); 
    state.boardCards.push({ type: 'zh', text: newWord.zh, word: newWord }, { type: 'en', text: newWord.en, phonetic: newWord.phonetic, word: newWord }); 
  } 
  state.boardCards.sort(() => Math.random() - 0.5); 
  board.innerHTML = ''; 
  state.boardCards.forEach((cardData, idx) => { 
    cardData.diagonal = Math.random() > 0.7; 
    d.className = `game-card ${cardData.type}${cardData.diagonal ? ' diagonal' : ''}`; 
    let t = cardData.text; 
    if (cardData.type === 'en') t = highlightVowels(t); 
    d.innerHTML = `<div class="text">${t}</div>${(cardData.phonetic && cardData.type==='en') ? `<div class="phonetic">${cardData.phonetic}</div>` : ''}<div class="speaker">🔊</div>`; 
    d.onclick = (e) => handleCardClick(e, d, cardData); 
    board.appendChild(d); 
    cardData.dom = d; 
    cardData.index = idx; 
  }); 
}

function speak(text, lang='ta-IN'){ 
  if('speechSynthesis' in window){ 
    const cleanText = text.replace(/[\[\]]/g, '').trim(); 
    if(!cleanText) return; 
    const u=new SpeechSynthesisUtterance(cleanText); 
    u.lang=lang; 
    u.rate=0.9; 
    u.pitch=1; 
    window.speechSynthesis.speak(u); 
  } 
}

function toggleLang(){ 
  const btn = document.getElementById('langBtn'); 
  currentLangIndex = (currentLangIndex + 1) % VOICE_LANGS.length; 
  const selected = VOICE_LANGS[currentLangIndex]; 
  state.voiceLang = selected.code; 
  btn.textContent = selected.label; 
}

async function toggleMic(){ 
  const btn = document.getElementById('micBtn'); 
  const input = document.getElementById('voiceInput'); 
  if(!state.isRecording){ 
    try{ 
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition; 
      if(!SR){ 
        showPureToast('不支援語音辨識','請手動打字輸入', 'error'); 
        return; 
      } 
      if('speechSynthesis' in window) window.speechSynthesis.cancel(); 
      state.recognition = new SR(); 
      state.recognition.lang = state.voiceLang; 
      
      state.recognition.onstart = () => { 
        state.isRecording = true; 
        btn.classList.add('recording'); 
      }; 
      state.recognition.onresult = (e) => { 
        input.value = e.results[0][0].transcript; 
        stopRecording(); 
        submitInput(); 
      }; 
      state.recognition.onend = () => stopRecording(); 
      state.recognition.start(); 
    }catch(err){ 
      stopRecording(); 
    } 
  }else{ 
    if(state.recognition) try { state.recognition.stop(); } catch(e){} 
    stopRecording(); 
  } 
}
function stopRecording(){ state.isRecording = false; const btn = document.getElementById('micBtn'); if(btn) btn.classList.remove('recording'); }
function cleanText(str) { return str.toLowerCase().replace(/[\s\p{P}\p{S}]/gu, ''); }

async function fetchOnlineTranslation(text) {
  try {
    const isTamil = /[\u0B80-\u0BFF]/.test(text);
    const pair = isTamil ? "ta|zh-TW" : "zh-TW|ta";
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${pair}`);
    if (!res.ok) return null;
    const data = await res.json();
    if (data && data.responseData && data.responseData.translatedText) {
      let result = data.responseData.translatedText.trim();
      if (cleanText(result) === cleanText(text)) return null; 
      return result;
    }
    return null;
  } catch (e) {
    return null;
  }
}

async function submitInput(){ 
  const input = document.getElementById('voiceInput'); 
  const text = input.value.trim(); 
  if(!text) return; 
  
  clearAllToasts();
  input.blur(); 
  
  const userCleaned = cleanText(text); 
  let matchedCards = state.boardCards.filter(c => userCleaned === cleanText(c.text)); 
  
  if(matchedCards.length > 0){ 
    const targetZh = matchedCards[0].word.zh; 
    const targetEn = matchedCards[0].word.en;
    const pair = state.boardCards.filter(c => c.word.zh === targetZh); 
    
    showPureToast(targetZh, targetEn, 'success');
    
    pair.forEach(c => c.dom.classList.add('correct')); 
    state.matched++; 
    document.getElementById('matched').textContent = state.matched; 
    if('speechSynthesis' in window && state.soundEnabled) {
      const cleanEn = targetEn.replace(/[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim();
      speak(cleanEn, 'ta-IN'); 
    }
    setTimeout(()=>{ shiftAndRefill(pair[0].dom, pair[1]?.dom || pair[0].dom); }, 400); 
  } else { 
    const foundInDict = BASE_VOCABULARY.find(v => cleanText(v.zh) === userCleaned || cleanText(v.en) === userCleaned);
    const foundInCustom = state.customWords.find(v => cleanText(v.zh) === userCleaned || cleanText(v.en) === userCleaned);
    const existInVocabulary = foundInDict || foundInCustom;

    if(existInVocabulary) {
      showPureToast(existInVocabulary.zh, existInVocabulary.en, 'success');
      if('speechSynthesis' in window && state.soundEnabled) {
        const cleanEn = existInVocabulary.en.replace(/[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim();
        speak(cleanEn, 'ta-IN');
      }
    } else {
      const onlineResult = await fetchOnlineTranslation(text);
      if (onlineResult) {
        const isTamil = /[\u0B80-\u0BFF]/.test(text);
        const zhPart = isTamil ? onlineResult : text;
        const enPart = isTamil ? text : onlineResult;
        
        showPureToast(zhPart, enPart, 'web');
        if('speechSynthesis' in window && state.soundEnabled) {
          speak(enPart, 'ta-IN');
        }
      } else {
        playBeepSound(); 
        showPureToast("網路查無文字", "網路搜尋不到，字庫也無此單字！", 'error');
      }
    }
  } 
  input.value = ''; 
}

function endGame(){ clearInterval(state.timerId); document.getElementById('resTime').textContent=document.getElementById('timer').textContent; document.getElementById('resMatched').textContent=state.matched; document.getElementById('endModal').classList.add('active'); }
function goHome(){ document.getElementById('endModal').classList.remove('active'); document.getElementById('gameScreen').classList.add('hidden'); document.getElementById('startScreen').classList.remove('hidden'); clearInterval(state.timerId); updateTotalWords(); }
function retry(){document.getElementById('endModal').classList.remove('active');startGame();}
init();
</script>
