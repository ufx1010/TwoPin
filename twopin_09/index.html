<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>畫中有詩篇</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { margin: 0; padding: 0; background-color: #121212; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background-color: #1e1e1e; padding: 5px; text-align: center; font-size: 13px; font-weight: bold; border-bottom: 1px solid #333; color: #fff; flex-shrink: 0; }
        
        .main-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; height: calc(100vh - 25px); }
        @media (min-width: 900px) { .main-layout { flex-direction: row; } }
        
        .stage { flex: 1; background-color: #0a0a0a; display: flex; align-items: center; justify-content: center; padding: 6px; overflow: hidden; position: relative; }
        .canvas-box { box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; max-width: 100%; max-height: 100%; position: relative; margin: auto; }
        canvas { display: block; max-width: 100%; max-height: 30vh; object-fit: contain; background-color: #222; cursor: move; }

        .toolbar { flex: 1.2; background-color: #1e1e1e; border-top: 1px solid #333; padding: 6px 10px 12px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; -webkit-overflow-scrolling: touch; max-width: 100vw; }
        @media (min-width: 900px) { .toolbar { border-top: none; border-left: 1px solid #333; } }
        
        .row { display: flex; gap: 6px; align-items: center; width: 100%; }
        .col { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
        
        input[type="text"], select { width: 100%; background: #2b2b2b; border: 1px solid #444; color: #fff; padding: 4px 6px; border-radius: 4px; font-size: 13px; box-sizing: border-box; -webkit-user-select: text; user-select: text; height: 28px; transition: all 0.20s ease-in-out; }
        input[type="text"]#input-title:focus { height: 45px; font-size: 20px; border-color: #39cccc; box-shadow: 0 0 8px rgba(57,204,204,0.5); }
        
        textarea { width: 100%; background: #2b2b2b; border: 1px solid #444; color: #fff; padding: 4px 6px; border-radius: 4px; font-size: 13px; box-sizing: border-box; -webkit-user-select: text; user-select: text; height: 32px; min-height: 32px; transition: all 0.20s ease-in-out; }
        textarea:focus { height: 28vh; font-size: 20px; border-color: #39cccc; box-shadow: 0 0 8px rgba(57,204,204,0.5); }

        .size-ctrl { display: flex; align-items: center; background: #2b2b2b; border: 1px solid #444; border-radius: 4px; overflow: hidden; width: 100%; height: 28px; }
        .size-btn { background: #3a3a3a; color: #fff; border: none; width: 28px; height: 100%; font-size: 13px; font-weight: bold; cursor: pointer; }
        .size-btn:active { background: #39cccc; color: #111; }
        .size-val { flex: 1; text-align: center; font-size: 12px; font-family: monospace; color: #fff; white-space: nowrap; }

        .file-label { font-size: 11px; color: #bbb; margin-bottom: 1px; display: block; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-dl { background: #39cccc; color: #111; border: none; padding: 8px; border-radius: 5px; width: 100%; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 3px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }

        .top-triple-row { background: rgba(255,255,255,0.03); border: 1px solid #383838; padding: 5px; border-radius: 5px; display: flex; gap: 5px; width: 100%; align-items: flex-end; }
        .custom-file-upload { display: inline-block; width: 100%; background: #2b2b2b; border: 1px solid #555; border-radius: 4px; padding: 5px 2px; text-align: center; color: #fff; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; overflow: hidden; height: 28px; line-height: 16px; }
        .custom-file-upload:active { background: #444; }
    </style>
</head>
<body>

    <header>《畫中有詩篇》</header>

    <div class="main-layout">
        <div class="stage">
            <div class="canvas-box">
                <canvas id="pic-canvas"></canvas>
            </div>
        </div>

        <div class="toolbar" id="ctrl-panel">
            <div class="top-triple-row">
                <div class="col" style="flex: 1;">
                    <span class="file-label">🖼️ 選底圖</span>
                    <label class="custom-file-upload">
                        選擇照片
                        <input type="file" id="choose-img" accept="image/*" style="display: none;">
                    </label>
                </div>
                <div class="col" style="flex: 1;">
                    <span class="file-label" style="color:#39cccc;">🎨 選印章</span>
                    <label class="custom-file-upload" style="border-color: #39cccc; color: #39cccc;">
                        選擇印章
                        <input type="file" id="choose-img2" accept="image/*" style="display: none;">
                    </label>
                </div>
                <div class="col" style="flex: 1.2;">
                    <span class="file-label" style="color:#39cccc; text-align: center;">🔍 印章縮放控制</span>
                    <div class="size-ctrl" style="border-color:#39cccc;">
                        <button class="size-btn" style="background:#222; color:#39cccc; width:24px;" onclick="changeImg2Scale(-0.05)">-</button>
                        <span class="size-val" id="val-img2-scale" style="color:#39cccc; font-size:11px; font-weight:bold;">100%</span>
                        <button class="size-btn" style="background:#222; color:#39cccc; width:24px;" onclick="changeImg2Scale(0.05)">+</button>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col" style="flex: 1.2;">
                    <span class="file-label">✍️ 標題</span>
                    <input type="text" id="input-title" value="《竹石》江波" placeholder="用空格或斜線區隔署名，如：《竹石》江波">
                </div>
                <div class="col" style="flex: 0.8;">
                    <span class="file-label">📐 標題大小</span>
                    <div class="size-ctrl">
                        <button class="size-btn" onclick="changeSize('title', -2)">-</button>
                        <span class="size-val" id="val-title-size">42</span>
                        <button class="size-btn" onclick="changeSize('title', 2)">+</button>
                    </div>
                </div>
            </div>

            <div class="row" style="align-items: flex-start;">
                <div class="col" style="flex: 1.2;">
                    <span class="file-label">📝 內文</span>
                    <textarea id="text-content" placeholder="輸入詩詞內文">咬定青山不放鬆，&#10;立根原在破岩中。&#10;千磨萬擊還堅勁，&#10;任爾東西南北風。</textarea>
                </div>
                <div class="col" style="flex: 0.8;">
                    <span class="file-label">📐 內文字大</span>
                    <div class="size-ctrl">
                        <button class="size-btn" onclick="changeSize('content', -2)">-</button>
                        <span class="size-val" id="val-content-size">30</span>
                        <button class="size-btn" onclick="changeSize('content', 2)">+</button>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col" style="flex: 1.1;">
                    <span class="file-label">🔤 選用瀏覽器字型</span>
                    <select id="font-family-select" onchange="shrinkInputs()">
                        <option value="'Noto Serif TC', 'PMingLiU', 'MingLiU', serif" selected>細明體 / 宋體</option>
                        <option value="KaiTi, '標楷體', 'DFKai-SB', serif">標準標楷體</option>
                        <option value="'Microsoft JhengHei', '微軟正黑體', sans-serif">微軟正黑體</option>
                        <option value="'PingFang TC', '蘋方體', 'Heiti TC', sans-serif">蘋果蘋方 / 黑體</option>
                        <option value="sans-serif">系統預設內設體</option>
                        <option value="CUSTOM">手動輸入裝置字型</option>
                    </select>
                </div>
                <div class="col" style="flex: 1.1;">
                    <span class="file-label">⌨️ 手動輸入字型</span>
                    <input type="text" id="custom-font-name" placeholder="例如: 仿宋體" value="仿宋體">
                </div>
                <div class="col" style="flex: 0.4;">
                    <span class="file-label">🎨 顏色</span>
                    <input type="color" id="text-color" value="#ffffff" style="width:100%; height:28px; background:#2b2b2b; border:1px solid #444; border-radius:4px; padding:1px;">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <span class="file-label">🔄 排列書寫方向</span>
                    <select id="text-dir" onchange="handleDirectionChange()">
                        <option value="v-rl" selected>直排 (由右至左)</option>
                        <option value="v-lr">直排 (由左至右)</option>
                        <option value="h-lr">橫排 (由左至右)</option>
                    </select>
                </div>
                <div class="col">
                    <span class="file-label">🎯 字體對齊方式</span>
                    <select id="text-align" onchange="shrinkInputs()">
                        <option value="start" selected>靠頂/靠左對齊</option>
                        <option value="center">置中對齊</option>
                        <option value="end">靠底/靠右對齊</option>
                    </select>
                </div>
            </div>

            <div style="margin-top: 4px;">
                <button class="btn-dl" id="save-pic">💾 匯出並儲存高畫質作品</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pic-canvas');
        const ctx = canvas.getContext('2d');

        let bgImg = new Image();
        let isBgLoaded = false;
        let img2 = new Image();
        let isImg2Loaded = false;

        const textObj = { centerX: 400, centerY: 400, width: 100, height: 100, userMoved: false };
        const conf = { titleSize: 42, contentSize: 30, gap: 25 };
        const img2Conf = { centerX: 200, centerY: 200, scale: 1.0 };

        canvas.width = 800; canvas.height = 800;
        window.onload = function() { render(); };

        window.shrinkInputs = function() {
            document.getElementById('text-content').blur();
            document.getElementById('input-title').blur();
        };

        window.handleDirectionChange = function() {
            shrinkInputs();
            const dir = document.getElementById('text-dir').value;
            const alignSelect = document.getElementById('text-align');
            alignSelect.value = (dir === 'h-lr') ? 'center' : 'start';
            render();
        };

        document.getElementById('ctrl-panel').addEventListener('click', function(e) {
            if(e.target.id !== 'text-content' && e.target.id !== 'input-title' && e.target.id !== 'custom-font-name') {
                shrinkInputs();
            }
        });

        window.changeSize = function(type, amt) {
            shrinkInputs();
            if (type === 'title') {
                conf.titleSize = Math.max(12, conf.titleSize + amt);
                document.getElementById('val-title-size').innerText = conf.titleSize;
            } else {
                conf.contentSize = Math.max(12, conf.contentSize + amt);
                document.getElementById('val-content-size').innerText = conf.contentSize;
            }
            render();
        };

        window.changeImg2Scale = function(amt) {
            img2Conf.scale = Math.max(0.01, Math.min(15.0, img2Conf.scale + amt));
            document.getElementById('val-img2-scale').innerText = Math.round(img2Conf.scale * 100) + "%";
            if (isImg2Loaded) render();
        };

        document.getElementById('choose-img').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                bgImg = new Image();
                bgImg.onload = function() {
                    canvas.width = bgImg.naturalWidth;
                    canvas.height = bgImg.naturalHeight;
                    if (!textObj.userMoved) {
                        const dir = document.getElementById('text-dir').value;
                        textObj.centerX = (dir === 'v-rl') ? canvas.width * 0.75 : canvas.width * 0.25;
                        textObj.centerY = canvas.height * 0.4;
                    }
                    if(isImg2Loaded) { img2Conf.centerX = canvas.width / 2; img2Conf.centerY = canvas.height / 2; }
                    isBgLoaded = true;
                    render();
                };
                bgImg.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('choose-img2').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                img2 = new Image();
                img2.onload = function() {
                    isImg2Loaded = true;
                    img2Conf.centerX = canvas.width / 2;
                    img2Conf.centerY = canvas.height / 2;
                    render();
                };
                img2.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        function getCanvasCoord(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        let activeObj = null;
        let dragOffset = { x: 0, y: 0 };

        function dragStart(e) {
            shrinkInputs();
            activeObj = null;
            const pos = getCanvasCoord(e);

            const textDist = Math.hypot(pos.x - textObj.centerX, pos.y - textObj.centerY);
            if (textDist < Math.max(textObj.width, textObj.height) / 1.4) {
                activeObj = 'text';
                dragOffset.x = pos.x - textObj.centerX;
                dragOffset.y = pos.y - textObj.centerY;
                textObj.userMoved = true;
                if (e.cancelable) e.preventDefault();
                return;
            }

            if (isImg2Loaded) {
                const w = img2.naturalWidth * img2Conf.scale;
                const h = img2.naturalHeight * img2Conf.scale;
                const img2Dist = Math.hypot(pos.x - img2Conf.centerX, pos.y - img2Conf.centerY);
                if (img2Dist < Math.max(w, h) / 1.4) {
                    activeObj = 'img2';
                    dragOffset.x = pos.x - img2Conf.centerX;
                    dragOffset.y = pos.y - img2Conf.centerY;
                    if (e.cancelable) e.preventDefault();
                    return;
                }
            }
        }

        function dragMove(e) {
            if (!activeObj) return;
            const pos = getCanvasCoord(e);

            if (activeObj === 'text') {
                textObj.centerX = pos.x - dragOffset.x;
                textObj.centerY = pos.y - dragOffset.y;
            } else if (activeObj === 'img2') {
                img2Conf.centerX = pos.x - dragOffset.x;
                img2Conf.centerY = pos.y - dragOffset.y;
            }
            if (e.cancelable) e.preventDefault();
            render();
        }

        function dragEnd(e) { activeObj = null; }

        canvas.addEventListener('mousedown', dragStart);
        canvas.addEventListener('touchstart', dragStart, { passive: false });
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('touchmove', dragMove, { passive: false });
        window.addEventListener('mouseup', dragEnd);
        window.addEventListener('touchend', dragEnd);

        const elIds = ['input-title', 'text-content', 'font-family-select', 'custom-font-name', 'text-color', 'text-align'];
        elIds.forEach(id => {
            document.getElementById(id).addEventListener('input', render);
            document.getElementById(id).addEventListener('change', render);
        });

        // 解析標題與落款署名
        function parseTitleAndAuthor(titleStr) {
            if (!titleStr) return { title: '', author: '' };
            const match = titleStr.match(/[\/\s\u3000\-_]/);
            if (match) {
                const splitIdx = match.index;
                const matchedSep = match[0];
                return {
                    title: titleStr.substring(0, splitIdx).trim(),
                    author: titleStr.substring(splitIdx + matchedSep.length).trim()
                };
            }
            return { title: titleStr.trim(), author: '' };
        }

        function drawChar(char, x, y, size, font, isDirVertical, isAuthor) {
            let fontStyle = isAuthor ? `italic ${size}px ${font}` : `${size}px ${font}`;
            ctx.font = fontStyle;
            
            if (!isDirVertical) { ctx.fillText(char, x, y); return; }

            if ('，，。。、、；；：：』』」」'.indexOf(char) !== -1) {
                ctx.save(); ctx.translate(x + size * 0.25, y - size * 0.08); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(char, 0, 0); ctx.restore(); return;
            }
            if (char === '《' || char === '<' || char === '『' || char === '「') { 
                ctx.save(); ctx.translate(x, y + size*0.4); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = isAuthor ? `italic bold ${size}px ${font}` : `bold ${size}px ${font}`; 
                ctx.fillText('︽', 0, 0); ctx.restore(); return; 
            }
            if (char === '》' || char === '>' || char === '』' || char === '」') { 
                ctx.save(); ctx.translate(x, y + size*0.4); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = isAuthor ? `italic bold ${size}px ${font}` : `bold ${size}px ${font}`; 
                ctx.fillText('︾', 0, 0); ctx.restore(); return; 
            }

            const isEmoji = /[\uD800-\uDBFF][\uDC00-\uDFFF]|\u261d|\u270c|\u2b50|\u2605|\u2606/g.test(char);
            if (isEmoji) {
                ctx.save(); ctx.translate(x, y + size * 0.45); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(char, 0, 0); ctx.restore(); return;
            }
            ctx.fillText(char, x, y);
        }

        function splitStringIntoChars(str) { return Array.from(str); }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isBgLoaded) {
                ctx.drawImage(bgImg, 0, 0);
            } else {
                ctx.fillStyle = "#222"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#666"; ctx.font = "16px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("請先選取底圖照片與印章圖", canvas.width / 2, canvas.height / 2);
            }

            if (isImg2Loaded) {
                ctx.save();
                const w = img2.naturalWidth * img2Conf.scale;
                const h = img2.naturalHeight * img2Conf.scale;
                ctx.drawImage(img2, img2Conf.centerX - w/2, img2Conf.centerY - h/2, w, h);
                ctx.restore();
            }

            const rawTitle = document.getElementById('input-title').value;
            const content = document.getElementById('text-content').value;
            const selectFont = document.getElementById('font-family-select').value;
            const customFont = document.getElementById('custom-font-name').value;
            const color = document.getElementById('text-color').value;
            const dir = document.getElementById('text-dir').value;
            const align = document.getElementById('text-align').value;

            let font = (selectFont === 'CUSTOM') ? customFont : selectFont;
            if(!font) font = 'sans-serif';

            if (!textObj.userMoved && isBgLoaded) {
                textObj.centerX = (dir === 'v-rl') ? canvas.width * 0.75 : canvas.width * 0.25;
                textObj.centerY = canvas.height * 0.4;
            }

            ctx.fillStyle = color;
            ctx.shadowColor = "rgba(0,0,0,0.85)"; ctx.shadowBlur = canvas.width * 0.006; ctx.shadowOffsetX = canvas.width * 0.002; ctx.shadowOffsetY = canvas.width * 0.002;

            // 解析分離標題與落款名字
            const parsed = parseTitleAndAuthor(rawTitle);
            const titleText = parsed.title;
            const authorText = parsed.author;

            let lines = content.split('\n');
            if (lines.length === 0 || (lines.length === 1 && lines[0] === '')) {
                lines = [''];
            }

            let totalW = 0, totalH = 0;

            if (dir === 'h-lr') {
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                
                let blockLines = [];
                if (titleText) {
                    blockLines.push({ isTitle: true, text: titleText, size: conf.titleSize });
                }
                
                lines.forEach((l, idx) => {
                    blockLines.push({ 
                        isTitle: false, 
                        text: l, 
                        size: conf.contentSize,
                        isLastLine: (idx === lines.length - 1)
                    });
                });

                let estimatedH = 0;
                blockLines.forEach((b, idx) => {
                    estimatedH += b.size;
                    if (idx < blockLines.length - 1) estimatedH += conf.gap;
                });
                totalH = estimatedH;

                let startY = textObj.centerY - estimatedH / 2;
                blockLines.forEach(b => {
                    if (b.isTitle) {
                        ctx.font = `bold ${b.size}px ${font}`;
                        ctx.fillText(b.text, textObj.centerX, startY + b.size/2);
                        let m = ctx.measureText(b.text).width; if(m > totalW) totalW = m;
                        startY += b.size + conf.gap;
                    } else {
                        if (b.isLastLine && authorText) {
                            // 橫排最後一行：文字 + 空格 + 斜體名字
                            let fullText = b.text + "  " + authorText;
                            ctx.font = `${b.size}px ${font}`;
                            
                            // 計算總寬
                            let baseW = ctx.measureText(b.text + "  ").width;
                            ctx.font = `italic ${b.size}px ${font}`;
                            let authW = ctx.measureText(authorText).width;
                            let lineTotalW = baseW + authW;
                            if(lineTotalW > totalW) totalW = lineTotalW;

                            // 繪製
                            ctx.save();
                            ctx.textAlign = 'left';
                            let drawStartX = textObj.centerX - lineTotalW / 2;
                            ctx.font = `${b.size}px ${font}`;
                            ctx.fillText(b.text, drawStartX, startY + b.size/2);
                            
                            ctx.font = `italic ${b.size}px ${font}`;
                            ctx.fillText(authorText, drawStartX + baseW, startY + b.size/2);
                            ctx.restore();
                        } else {
                            ctx.font = `${b.size}px ${font}`;
                            ctx.fillText(b.text, textObj.centerX, startY + b.size/2);
                            let m = ctx.measureText(b.text).width; if(m > totalW) totalW = m;
                        }
                        startY += b.size + conf.gap;
                    }
                });
            } else {
                // 古風直排模式
                ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                
                let cols = [];
                if (titleText) {
                    let charsObj = splitStringIntoChars(titleText).map(c => ({ char: c, size: conf.titleSize, isAuthor: false }));
                    cols.push({ isTitle: true, chars: charsObj, size: conf.titleSize });
                }

                lines.forEach((l, idx) => {
                    let charsObj = splitStringIntoChars(l).map(c => ({ char: c, size: conf.contentSize, isAuthor: false }));
                    
                    // 🌟 核心改動：如果是內文最後一行，且有落款名字，則將名字排在最後面
                    if (idx === lines.length - 1 && authorText) {
                        let authorChars = splitStringIntoChars(authorText).map(c => ({ char: c, size: conf.contentSize, isAuthor: true }));
                        charsObj = charsObj.concat(authorChars);
                    }
                    
                    cols.push({ isTitle: false, chars: charsObj, size: conf.contentSize });
                });

                // 計算每列最大高度
                let maxH = 0;
                cols.forEach(c => {
                    let colH = 0;
                    c.chars.forEach(ch => { colH += ch.size * 1.3; });
                    if (colH > maxH) maxH = colH;
                });
                totalH = maxH;

                let estimatedW = 0;
                cols.forEach((c, idx) => {
                    estimatedW += c.size;
                    if (idx < cols.length - 1) estimatedW += conf.gap;
                });
                totalW = estimatedW;

                let startX = textObj.centerX + (dir === 'v-rl' ? estimatedW / 2 : -estimatedW / 2);

                cols.forEach(c => {
                    let colH = 0;
                    c.chars.forEach(ch => { colH += ch.size * 1.3; });

                    let drawY = textObj.centerY - totalH / 2;
                    if (align === 'center') {
                        drawY = textObj.centerY - colH / 2;
                    } else if (align === 'end') {
                        drawY = (textObj.centerY + totalH / 2) - colH;
                    }

                    let currentX = startX + (dir === 'v-rl' ? -c.size/2 : c.size/2);

                    for (let i = 0; i < c.chars.length; i++) {
                        let chObj = c.chars[i];
                        
                        // 🌟 靠底落款計算：如果是署名的字，且對齊方式不是靠底對齊時，我們讓它智慧「沉底」
                        let finalDrawY = drawY;
                        if (chObj.isAuthor && align !== 'end') {
                            // 計算這行內文原本長度與署名長度的空隙，讓署名緊貼該列的最底部
                            let authorIndexInCol = c.chars.filter((ch, idx) => idx < i && ch.isAuthor).length;
                            let totalAuthorChars = c.chars.filter(ch => ch.isAuthor).length;
                            
                            let remainY = totalH - colH; // 剩餘沉底空隙
                            if (remainY > 0) {
                                finalDrawY = drawY + remainY;
                            }
                        }

                        drawChar(chObj.char, currentX, finalDrawY, chObj.size, font, true, chObj.isAuthor);
                        drawY += chObj.size * 1.3;
                    }
                    
                    if (dir === 'v-rl') startX -= (c.size + conf.gap);
                    else startX += (c.size + conf.gap);
                });
            }
            textObj.width = totalW; textObj.height = totalH;
        }

        document.getElementById('save-pic').addEventListener('click', function() {
            if (!isBgLoaded) { alert("請先選取底圖照片！"); return; }
            const titleValue = document.getElementById('input-title').value.trim();
            const fileName = titleValue ? titleValue : '排版成品';
            const link = document.createElement('a');
            link.download = fileName + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
