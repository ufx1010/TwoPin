    const tsBtn = document.createElement('button'); tsBtn.type = 'button'; tsBtn.className = 'ts-btn shrink-0 font-mono text-[11px] rounded px-1 py-0.5 transition active:scale-90 ' + (stamp ? 'text-violet-300 bg-violet-900/20 border border-violet-700/40' : 'text-zinc-700 bg-white/3 border border-white/8');
    tsBtn.textContent = stamp ? `[${stamp}]` : '[--:--]'; tsBtn.dataset.stamp = stamp || ''; tsBtn.onclick = () => openNumpad(tsBtn.dataset.stamp, row, boxId, taId);
    const td = document.createElement('div'); td.contentEditable = true; td.className = 'flex-1 text-[13px] text-white outline-none min-h-[18px] break-words leading-snug px-1'; td.textContent = text; td.oninput = () => syncEditorToTa(boxId, taId);
    const del = document.createElement('button'); del.type = 'button'; del.textContent = '✕'; del.className = 'shrink-0 text-zinc-500 hover:text-red-400 text-[14px] px-1.5 font-bold transition active:scale-90'; del.onclick = () => { row.remove(); syncEditorToTa(boxId, taId); };

  function renderEditor(boxId, taId, linesText) {
    const box = document.getElementById(boxId); if (!box) return; box.innerHTML = '';
    (linesText||'').split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{ const {stamp,text}=stripExtraStamps(line); box.appendChild(makeLyricRow(stamp, text||line, boxId, taId)); });
  }
  function syncEditorToTa(boxId, taId) {
    const box=document.getElementById(boxId), ta=document.getElementById(taId); if(!box||!ta)return;
    ta.value=[...box.querySelectorAll('.lyric-row')].map(row=>{ const tsBtn=row.querySelector('.ts-btn'); const td=row.querySelector('[contenteditable]'); const stamp=tsBtn?tsBtn.dataset.stamp:''; const text=td?td.textContent.trim():''; return stamp?`[${stamp}] ${text}`:text; }).filter(Boolean).join('\n');
  }
  
  document.getElementById('btnAddRowL1').onclick=()=>{ document.getElementById('lyricsEditor1').appendChild(makeLyricRow('','','lyricsEditor1','eLyrics1')); syncEditorToTa('lyricsEditor1','eLyrics1'); };
  document.getElementById('btnAddRowL2').onclick=()=>{ document.getElementById('lyricsEditor2').appendChild(makeLyricRow('','','lyricsEditor2','eLyrics2')); syncEditorToTa('lyricsEditor2','eLyrics2'); };
  
  let practicePanelOpen=false, practiceUseOrigin=false, lastSaidText='', recognition=null, micActive=false;
  function isCJK(text){ return /[\u4e00-\u9fff\u3040-\u30ff]/.test(text||''); }
  function isCJKChar(ch){ return /[\u4e00-\u9fff\u3040-\u30ff]/.test(ch||''); }
  function hasLatinWord(text){ return /[A-Za-z]/.test(text||''); }
  // 混合語言斷詞：中日文（漢字/假名）逐字拆開比對；其餘任何文字（英文、坦米爾文、韓文...）
  // 以空白分隔的完整單字為單位比對。用「排除法」而不是只認 A-Za-z，這樣坦米爾文、
  // 韓文等文字才不會被斷詞邏輯直接忽略、憑空消失。
  function tokenize(text){ if(!text)return[]; return text.match(/[\u4e00-\u9fff\u3040-\u30ff]|[^\s\u4e00-\u9fff\u3040-\u30ff]+/g) || []; }
  function normWord(w){ return (w||'').toLowerCase().replace(/[.,!?;:"'()「」、，。！？]/g,'').trim(); }
  function levenshtein(a,b){
    const m=a.length,n=b.length; if(m===0)return n; if(n===0)return m; const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]); for(let j=0;j<=n;j++)dp[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){ dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]); } return dp[m][n];
  }
  function wordSimilarity(a,b){ a=normWord(a); b=normWord(b); if(!a||!b)return 0; if(a===b)return 1; return 1-levenshtein(a,b)/Math.max(a.length,b.length); }
  function getPracticeTargetText(){ return practiceUseOrigin?currentLineT1:currentLineT2; }
  function updatePracticeLangBtn(){
    $('#btnPracticeLang').textContent = practiceUseOrigin ? '1' : '2';
  }
  function renameLinguabookIdxKey() {
    const oldKey = localStorage.getItem('linguabook:idx');
    if (oldKey && isNaN(parseInt(oldKey))) localStorage.setItem('linguabook:idx', '0');
  }
  function renderPracticeLine(){
    const target=getPracticeTargetText(); const box=$('#practiceLineDisplay'); if(!target){ box.innerHTML='<span class="text-zinc-600 text-[13px]">此句沒有可練習的文字</span>'; updateScoreDisplay(0,0); return; }
    const tokens=tokenize(target); box.innerHTML=tokens.map((t,i)=>`<span id="pw-${i}" class="text-zinc-500 transition-colors duration-200${isCJKChar(t)?'':' mx-0.5'}">${t}</span>`).join(''); updateScoreDisplay(0,tokens.length);
  }
  function updateScoreDisplay(matched,total){ const pct=total?Math.round(matched/total*100):0; $('#practiceScore').textContent=`${matched}/${total}（${pct}%）`; const bar=$('#practiceProgressBar'); if(bar)bar.style.width=pct+'%'; }
  function highlightAgainst(saidText){
    lastSaidText=saidText||''; const target=getPracticeTargetText(); if(!target)return; const threshold=parseInt($('#toleranceSlider').value,10)/100; const tokens=tokenize(target); const saidWords=lastSaidText.toLowerCase().split(/\s+/).filter(Boolean); let matched=0;
    tokens.forEach((t,i)=>{
      let ok;
      if (isCJKChar(t)) { ok = lastSaidText.includes(t); }
      else { let best=0; saidWords.forEach(sw=>{ const sim=wordSimilarity(t,sw); if(sim>best)best=sim; }); ok = best>=threshold; }
      if(ok)matched++; const span=document.getElementById('pw-'+i); if(span) span.className=`transition-colors duration-200${isCJKChar(t)?'':' mx-0.5'} ${ok?'text-emerald-400 font-bold':'text-zinc-500'}`;
    });
    updateScoreDisplay(matched,tokens.length);
  }
  function refreshPracticeIfOpen(){ if(!practicePanelOpen)return; updatePracticeLangBtn(); renderPracticeLine(); $('#practiceInput').value=''; lastSaidText=''; }
  
  function setPracticeOpen(open){
    practicePanelOpen = open; $('#practicePanel').classList.toggle('hidden', !open); $('#togglePracticeBtn').className = open ? activeBtnClass : inactiveBtnClass;
    if (open) { if(_mediaFullscreenOn) disableMediaFullscreen(); updatePracticeLangBtn(); renderPracticeLine(); }
    else if (micActive && recognition) { recognition.stop(); }
  }
  $('#togglePracticeBtn').onclick = () => setPracticeOpen(!practicePanelOpen);
  $('#btnClosePractice').onclick = () => setPracticeOpen(false);
  
  $('#btnPracticeLang').onclick=()=>{ practiceUseOrigin=!practiceUseOrigin; updatePracticeLangBtn(); renderPracticeLine(); $('#practiceInput').value=''; lastSaidText=''; };
  $('#toleranceSlider').oninput=(e)=>{ $('#toleranceValue').textContent=e.target.value+'%'; if(lastSaidText)highlightAgainst(lastSaidText); };
  $('#practiceInput').oninput=(e)=>highlightAgainst(e.target.value);
  $('#practiceInput').addEventListener('focus',()=>{ setTimeout(()=>$('#practiceInput').scrollIntoView({behavior:'smooth',block:'center'}),200); });
  function ensureRecognition(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR)return null; if(!recognition){ recognition=new SR(); recognition.continuous=false; recognition.interimResults=true; recognition.maxAlternatives=1; } return recognition;
  }
  $('#btnPracticeMic').onclick=()=>{
    const sr=ensureRecognition(); if(!sr){ $('#practiceHint').textContent='⚠️ 此瀏覽器不支援語音辨識，請改用打字輸入框測試，或改用 Chrome 開氣。'; return; }
    if(micActive){ sr.stop(); return; } const target=getPracticeTargetText(); if(!target){ $('#practiceHint').textContent='此句沒有可練習的文字'; return; }
    sr.lang=detectLang(target);
    sr.onstart=()=>{ micActive=true; $('#btnPracticeMic').classList.add('animate-pulse'); $('#practiceInput').value=''; $('#practiceHint').textContent='🎙️ 聆聽中，請開始唸出句子...'; };
    sr.onresult=(e)=>{ let text=''; for(let i=0;i<e.results.length;i++)text+=e.results[i][0].transcript; $('#practiceInput').value=text; highlightAgainst(text); };
    sr.onerror=(e)=>{ micActive=false; $('#btnPracticeMic').classList.remove('animate-pulse'); $('#practiceHint').textContent=`⚠️ 辨識發生問題（${e.error}），可改用打字輸入框測試。`; };
    sr.onend=()=>{ micActive=false; $('#btnPracticeMic').classList.remove('animate-pulse'); $('#practiceHint').textContent='點擊紅色麥克風開始錄音辨識；若麥克風無法使用，也可直接在輸入框打字測試比對效果。'; };
    try{ sr.start(); }catch(err){ $('#practiceHint').textContent='⚠️ 無法啟動麥克風，請改用打字輸入框測試。'; }
  };

  // ===== 側錄功能：只錄「影片/圖片顯示區」+「字幕顯示」，其餘畫面（按鈕、網址列等）都不會被錄進去 =====
  function wrapCanvasText(ctx, text, cx, y, maxWidth, lineHeight, maxLines){
    if(!text) return y;
    const chars=[...text]; let line=''; const lines=[];
    for(const ch of chars){ const test=line+ch; if(ctx.measureText(test).width>maxWidth && line){ lines.push(line); line=ch; } else line=test; }
    if(line) lines.push(line);
    const capped=lines.slice(0,maxLines||3);
    capped.forEach((l,i)=>ctx.fillText(l, cx, y+i*lineHeight));
    return y+capped.length*lineHeight;
  }
  function drawSideRecordFrame(){
    const canvas=sideRecordCanvas, ctx=sideRecordCtx; if(!canvas||!ctx)return;
    ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    const subH=Math.round(canvas.height*0.26); const mediaH=canvas.height-subH;
    let srcEl=null;
    if(!videoPlayer.classList.contains('hidden')) srcEl=videoPlayer;
    else if(!imageViewer.classList.contains('hidden')) srcEl=imageViewer;
    if(srcEl){
      const iw=srcEl.videoWidth||srcEl.naturalWidth||0, ih=srcEl.videoHeight||srcEl.naturalHeight||0;
      const ready = srcEl.tagName==='VIDEO' ? srcEl.readyState>=2 : srcEl.complete;
      if(ready && iw && ih){
        const scale=Math.max(canvas.width/iw, mediaH/ih); const dw=iw*scale, dh=ih*scale;
        const dx=(canvas.width-dw)/2, dy=(mediaH-dh)/2;
        ctx.drawImage(srcEl, dx, dy, dw, dh);
      }
    }
    ctx.fillStyle='rgba(9,9,13,0.97)'; ctx.fillRect(0, mediaH, canvas.width, subH);
    ctx.textAlign='center';
    const t1=showOriginText?currentLineT1:'', t2=showTransText?currentLineT2:'';
    const lyricColor=localStorage.getItem('linguabook:lyricColor')||'#ffffff';
    // 字級大小要跟畫面上「原文字型設定」實際看到的大小成比例，不能用畫布寬度隨便算一個固定比例，
    // 不然輸出影片的文字大小/排版就會跟畫面上看到的對不起來。
    const lyricSizePx = parseFloat(localStorage.getItem('linguabook:lyricSize')) || 17;
    const viewportW = document.documentElement.clientWidth || 380;
    const scaleRatio = canvas.width / viewportW;
    const t1FontPx = Math.max(24, Math.round(lyricSizePx * scaleRatio));
    const t2FontPx = Math.max(20, Math.round(15 * scaleRatio));
    let y=mediaH+Math.round(subH*0.24);
    ctx.fillStyle=lyricColor; ctx.font=`bold ${t1FontPx}px sans-serif`;
    y=wrapCanvasText(ctx, t1, canvas.width/2, y, canvas.width*0.92, t1FontPx*1.25, 2);
    ctx.fillStyle='#a1a1aa'; ctx.font=`${t2FontPx}px sans-serif`;
    wrapCanvasText(ctx, t2, canvas.width/2, y+canvas.width*0.02, canvas.width*0.92, t2FontPx*1.25, 2);
    sideRecordRAF=requestAnimationFrame(drawSideRecordFrame);
  }
  let sideRecordAudioCtx=null; const sideRecordSourceCache=new WeakMap();
  function getSideRecordAudioTap(mediaEl){
    if(!sideRecordAudioCtx) sideRecordAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(sideRecordAudioCtx.state==='suspended') sideRecordAudioCtx.resume();
    if(sideRecordSourceCache.has(mediaEl)) return sideRecordSourceCache.get(mediaEl);
    const srcNode=sideRecordAudioCtx.createMediaElementSource(mediaEl);
    const destNode=sideRecordAudioCtx.createMediaStreamDestination();
    srcNode.connect(destNode); srcNode.connect(sideRecordAudioCtx.destination);
    sideRecordSourceCache.set(mediaEl, destNode); return destNode;
  }
  async function startSideRecord(){
    sideRecordCanvas=document.createElement('canvas'); sideRecordCanvas.width=720; sideRecordCanvas.height=1280;
    sideRecordCtx=sideRecordCanvas.getContext('2d');
    drawSideRecordFrame();
    const videoStream=sideRecordCanvas.captureStream(30);
    let combinedTracks=[...videoStream.getVideoTracks()];
    try{
      if(!isImageOnlyMode && activeMedia && activeMedia.src){
        const destNode=getSideRecordAudioTap(activeMedia);
        combinedTracks=combinedTracks.concat(destNode.stream.getAudioTracks());
      }
    }catch(err){ console.warn('輸出音訊擷取失敗，將只錄畫面', err); }
    const combined=new MediaStream(combinedTracks);
    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(t=>MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) || 'video/webm';
    sideRecordChunks=[];
    sideRecorder=new MediaRecorder(combined,{mimeType:mime});
    sideRecorder.ondataavailable=(e)=>{ if(e.data && e.data.size>0) sideRecordChunks.push(e.data); };
    sideRecorder.onstop=()=>{
      cancelAnimationFrame(sideRecordRAF);
      const blob=new Blob(sideRecordChunks,{type:'video/webm'});
      const url=URL.createObjectURL(blob);
      const title=(songs[idx]&&songs[idx].title)||'錄製';
      const safeName=title.replace(/[\\/:*?"<>|]/g,'_');
      const pad=n=>String(n).padStart(2,'0'); const d=new Date();
      const filename=`${safeName}_完整輸出_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}.webm`;
      const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),2000);
      showToast(`完整輸出完成，已下載「${filename}」（webm 影片格式，只包含畫面顯示區＋字幕，不含其他按鈕/網址列）`);
    };
    sideRecorder.start();
  }
  function stopSideRecord(){
    if(sideRecorder && sideRecorder.state!=='inactive') sideRecorder.stop();
  }
  let _fullExportWatcher=null, _isFullExport=false;
  async function startFullExport(){
    if(typeof MediaRecorder==='undefined'){ showToast('這個瀏覽器不支援輸出功能（需要 MediaRecorder API）。'); return; }
    if(sideRecorder && sideRecorder.state==='recording'){ showToast('側錄跟輸出不能同時進行，請先停止側錄。'); return; }
    if(!songs[idx]){ showToast('目前沒有載入歌曲可以輸出。'); return; }
    const btn=$('#btnFullExport'); btn.disabled=true; $('#fullExportLabel').textContent='⏳';
    window.speechSynthesis.cancel();
    _isFullExport=true; startSideRecord();
    $('#fullExportLabel').textContent='⏺'; btn.classList.add('bg-red-600/80','border-red-400'); btn.disabled=false;
    // 從目前播放進度開始輸出（不會跳回開頭），再按一次輸出鍵可立刻停止並輸出目前為止錄到的內容
    if(!isImageOnlyMode && activeMedia && activeMedia.src){
      activeMedia.play(); activeMedia.addEventListener('ended', onFullExportEnded, {once:true});
    } else {
      startImageTtsPlayback(_currentActiveIdx>=0 ? (parsedLyrics.lines[_currentActiveIdx]?.time||0) : 0);
      _fullExportWatcher=setInterval(()=>{ if(!imageTtsPlaying){ clearInterval(_fullExportWatcher); onFullExportEnded(); } },500);
    }
  }
  function onFullExportEnded(){
    _isFullExport=false; clearInterval(_fullExportWatcher); stopSideRecord();
    $('#fullExportLabel').textContent='⬇️'; $('#btnFullExport').classList.remove('bg-red-600/80','border-red-400'); $('#btnFullExport').disabled=false;
  }
  $('#btnFullExport').onclick=()=>{
    if(_isFullExport){ if(!isImageOnlyMode&&activeMedia)activeMedia.pause(); else stopImageTtsPlayback(); onFullExportEnded(); return; }
    startFullExport();
  };
  // ===== 媒體全螢幕 + 字幕浮動視窗（可拖曳到螢幕任何位置）=====
  let _mediaFullscreenOn=false, _marqueeDrag=null;
  function clampMarqueePos(x,y){
    const box=$('#lyricMarqueeBox'); const w=box.offsetWidth||300, h=box.offsetHeight||68;
    const maxX=window.innerWidth-w-8, maxY=window.innerHeight-h-8;
    return { x: Math.min(Math.max(x,8),Math.max(8,maxX)), y: Math.min(Math.max(y,8),Math.max(8,maxY)) };
  }
  function setMarqueePos(x,y){
    const p=clampMarqueePos(x,y); const box=$('#lyricMarqueeBox');
    box.style.left=p.x+'px'; box.style.top=p.y+'px';
    localStorage.setItem('linguabook:marqueePos', JSON.stringify(p));
  }
  let _marqueeOrigParent=null, _marqueeOrigNext=null;
  function enableMediaFullscreen(){
    if(practicePanelOpen) setPracticeOpen(false);
    _mediaFullscreenOn=true;
    $('#mediaContainer').classList.add('media-fullscreen');
    $('#btnExitMediaFullscreen').classList.remove('hidden');
    const box=$('#lyricMarqueeBox');
    // #bottomToolbar 有 backdrop-filter（.glass），這會讓裡面的 position:fixed 元素
    // 變成相對於那個容器定位而不是整個螢幕，導致浮動字幕「消失」。
    // 解法：全螢幕時把字幕框直接搬到 body 底下，離開那個容器就正常了。
    _marqueeOrigParent=box.parentNode; _marqueeOrigNext=box.nextSibling;
    document.body.appendChild(box);
    box.classList.add('marquee-floating');
    let pos=null; try{ pos=JSON.parse(localStorage.getItem('linguabook:marqueePos')||'null'); }catch{}
    if(!pos) pos={ x:(window.innerWidth-Math.min(window.innerWidth*0.88,420))/2, y:window.innerHeight-220 };
    setMarqueePos(pos.x, pos.y);
  }
  function disableMediaFullscreen(){
    _mediaFullscreenOn=false;
    $('#mediaContainer').classList.remove('media-fullscreen');
    $('#btnExitMediaFullscreen').classList.add('hidden');
    const box=$('#lyricMarqueeBox'); box.classList.remove('marquee-floating');
    box.style.left=''; box.style.top='';
    if(_marqueeOrigParent){ _marqueeOrigParent.insertBefore(box, _marqueeOrigNext); _marqueeOrigParent=null; _marqueeOrigNext=null; }
  }
  $('#btnMediaFullscreen').onclick=()=>{ if(_mediaFullscreenOn) disableMediaFullscreen(); else enableMediaFullscreen(); };
  $('#btnExitMediaFullscreen').onclick=()=>disableMediaFullscreen();
  window._marqueeWasDragged=false;
  (function(){
    const box=$('#lyricMarqueeBox');
    const start=(x,y)=>{ if(!_mediaFullscreenOn)return; const rect=box.getBoundingClientRect(); _marqueeDrag={ offX:x-rect.left, offY:y-rect.top, startX:x, startY:y }; };
    const move=(x,y)=>{ if(!_marqueeDrag)return; if(Math.abs(x-_marqueeDrag.startX)>6 || Math.abs(y-_marqueeDrag.startY)>6) window._marqueeWasDragged=true; setMarqueePos(x-_marqueeDrag.offX, y-_marqueeDrag.offY); };
    const end=()=>{ _marqueeDrag=null; };
    box.addEventListener('touchstart',(e)=>{ if(!_mediaFullscreenOn)return; const t=e.touches[0]; start(t.clientX,t.clientY); },{passive:true});
    box.addEventListener('touchmove',(e)=>{ if(!_marqueeDrag)return; e.preventDefault(); const t=e.touches[0]; move(t.clientX,t.clientY); },{passive:false});
    box.addEventListener('touchend', end);
    box.addEventListener('mousedown',(e)=>{ if(!_mediaFullscreenOn)return; start(e.clientX,e.clientY); });
    window.addEventListener('mousemove',(e)=>move(e.clientX,e.clientY));
    window.addEventListener('mouseup', end);
  })();
  (async () => { renameLinguabookIdxKey(); await load(); await render(); restoreResumeState(); })();
})();
