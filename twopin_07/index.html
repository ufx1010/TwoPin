<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐒輸入法</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #111827; color: white; margin: 0; padding: 15px; }
        .tag { background: #374151; padding: 12px; border-radius: 8px; border: 1px solid #4b5563; 
               display: flex; align-items: center; touch-action: pan-y; overflow: hidden; height: 50px; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; padding: 10px 20px; border-radius: 999px; z-index: 500; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; background: #2563eb; display: flex; align-items: center; justify-content: center; }
        .recording { background: #dc2626 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <div v-if="toastMessage" class="toast">{{ toastMessage }}</div>
    <input type="file" id="fileInput" @change="importTxt" class="hidden" accept=".txt">

    <div class="grid grid-cols-3 gap-2 mb-4">
        <button @click="saveToDatabase" class="bg-green-700 p-3 rounded text-sm">存入</button>
        <button @click="exportTxt" class="bg-blue-700 p-3 rounded text-sm">匯出</button>
        <button @click="triggerFileInput" class="bg-yellow-700 p-3 rounded text-sm">匯入</button>
    </div>

    <textarea class="w-full h-24 bg-gray-800 p-3 rounded text-white" v-model="currentText" placeholder="輸入內容..."></textarea>

    <!-- 列表區域 -->
    <div id="sortable-list" class="grid grid-cols-2 gap-2 mt-4 pb-24">
        <div v-for="(item, index) in savedPhrases" :key="item.id" class="tag"
             @touchstart="handleTouchStart($event, item.text, index)"
             @touchend="handleTouchEnd($event, index)">
            <!-- 修改編號格式：移除 # 符號，改為數字加上點號 -->
            <span class="no-select text-gray-500 mr-2 font-bold shrink-0">{{ index + 1 }}.</span>
            <span class="truncate">{{ item.text }}</span>
        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 flex justify-center">
        <button @click="toggleSpeech" :class="['btn-circle', isListening ? 'recording' : '']">
            <i class="fa-solid fa-microphone"></i>
        </button>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
        setup() {
            const currentText = ref('');
            const savedPhrases = ref(JSON.parse(localStorage.getItem('myPhrases') || '[]'));
            const isListening = ref(false);
            const toastMessage = ref('');
            let touchData = { startX: 0, timer: null };
            let recognition = null;

            const showToast = (msg) => { toastMessage.value = msg; setTimeout(() => toastMessage.value = '', 2000); };
            const triggerFileInput = () => document.getElementById('fileInput').click();

            const saveToDatabase = () => {
                if(!currentText.value.trim()) return;
                savedPhrases.value.unshift({ id: Date.now(), text: currentText.value });
                localStorage.setItem('myPhrases', JSON.stringify(savedPhrases.value));
                currentText.value = '';
            };

            const toggleSpeech = () => {
                if(!recognition) return showToast("不支援語音");
                isListening.value ? recognition.stop() : (recognition.start(), isListening.value = true);
            };

            const exportTxt = () => {
                const textContent = savedPhrases.value.map(item => item.text).join('\n');
                const blob = new Blob([textContent], { type: 'text/plain' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.txt'; a.click();
            };

            const importTxt = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const lines = e.target.result.split('\n').filter(line => line.trim() !== '');
                    savedPhrases.value = lines.map(text => ({ id: Date.now() + Math.random(), text }));
                    localStorage.setItem('myPhrases', JSON.stringify(savedPhrases.value));
                    showToast('匯入成功');
                };
                reader.readAsText(file);
            };

            const handleTouchStart = (e, text, index) => {
                touchData.startX = e.touches[0].clientX;
                touchData.timer = setTimeout(() => {
                    navigator.clipboard.writeText(text);
                    showToast('已複製：' + text);
                }, 600);
            };

            const handleTouchEnd = (e, index) => {
                clearTimeout(touchData.timer);
                const diffX = e.changedTouches[0].clientX - touchData.startX;
                if (Math.abs(diffX) > 100) {
                    savedPhrases.value.splice(index, 1);
                    localStorage.setItem('myPhrases', JSON.stringify(savedPhrases.value));
                    showToast('已刪除');
                }
            };

            onMounted(() => {
                new Sortable(document.getElementById('sortable-list'), { animation: 150, onEnd: () => localStorage.setItem('myPhrases', JSON.stringify(savedPhrases.value)) });
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recognition = new SR();
                    recognition.lang = 'zh-TW'; recognition.continuous = true; recognition.interimResults = true;
                    recognition.onresult = (e) => { let t = ''; for(let i=e.resultIndex; i<e.results.length; ++i) t += e.results[i][0].transcript; currentText.value = t; };
                    recognition.onend = () => isListening.value = false;
                }
            });

            return { currentText, savedPhrases, isListening, toastMessage, toggleSpeech, saveToDatabase, handleTouchStart, handleTouchEnd, exportTxt, importTxt, triggerFileInput };
        }
    }).mount('#app');
</script>
</body>
</html>
