<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐒輸入法</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #111827; color: white; margin: 0; padding: 15px; user-select: none; }
        .btn-menu { background: #374151; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; }
        .text-area { width: 100%; height: 120px; background: #1f2937; border-radius: 12px; padding: 15px; margin: 10px 0; border: none; color: white; }
        
        /* 兩欄排版設定 */
        .grid-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 100px; }
        .tag { background: #374151; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #4b5563; 
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; justify-content: space-between; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; padding: 10px 20px; border-radius: 999px; z-index: 500; }
        
        /* 底部置中設定 */
        .fixed-bottom { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #2563eb; }
        .recording { animation: pulse 1.5s infinite; background: #dc2626 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <div v-if="toastMessage" class="toast">{{ toastMessage }}</div>
    <input type="file" id="fileInput" @change="importDatabase" class="hidden" accept=".json">

    <div class="grid grid-cols-3 gap-2 mb-4">
        <button @click="saveToDatabase" class="btn-menu bg-green-700">存入庫</button>
        <button @click="exportDatabase" class="btn-menu bg-blue-700">匯出</button>
        <button @click="triggerFileInput" class="btn-menu bg-yellow-700">匯入</button>
    </div>

    <textarea class="text-area" v-model="currentText" placeholder="輸入或辨識內容..."></textarea>

    <!-- 已移除標題 -->
    <div class="grid-list">
        <div v-for="(item, index) in savedPhrases" :key="index" class="tag" @click="copyText(item)">
            <span class="truncate">{{ item }}</span>
            <button @click.stop="deletePhrase(index)" class="ml-2 text-red-400 shrink-0"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <div class="fixed-bottom">
        <button @click="toggleSpeech" :class="['btn-circle', isListening ? 'recording' : '']">
            <i class="fa-solid fa-microphone"></i>
        </button>
        <div class="text-gray-500 text-xs italic">點擊麥克風開始辨識</div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
        setup() {
            const currentText = ref('');
            const savedPhrases = ref(JSON.parse(localStorage.getItem('myPhrases') || '[]'));
            const isListening = ref(false);
            const toastMessage = ref('');
            let recognition = null;

            const showToast = (msg) => { toastMessage.value = msg; setTimeout(() => { toastMessage.value = ''; }, 2000); };
            const copyText = (text) => { navigator.clipboard.writeText(text).then(() => showToast('已複製！')); };
            const triggerFileInput = () => { document.getElementById('fileInput').click(); };
            
            const importDatabase = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => { 
                    savedPhrases.value = JSON.parse(e.target.result); 
                    localStorage.setItem('myPhrases', JSON.stringify(savedPhrases.value)); 
                    showToast('匯入成功'); 
                };
                reader.readAsText(file);
            };

            const exportDatabase = () => {
                const blob = new Blob([JSON.stringify(savedPhrases.value)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
                showToast('已匯出');
            };

            onMounted(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognition = new SpeechRecognition();
                    recognition.lang = 'zh-TW'; recognition.continuous = true; recognition.interimResults = true;
                    recognition.onresult = (e) => { let t = ''; for(let i=e.resultIndex; i<e.results.length; ++i) t += e.results[i][0].transcript; currentText.value = t; };
                    recognition.onend = () => { isListening.value = false; };
                }
            });

            const toggleSpeech = () => { if(!recognition) return showToast("不支援"); isListening.value ? recognition.stop() : (recognition.start(), isListening.value = true); };
            const saveToDatabase = () => { if(!currentText.value.trim()) return; savedPhrases.value.unshift(currentText.value); localStorage.setItem('myPhrases', JSON.stringify(savedPhrases.value)); currentText.value = ''; showToast('已存入'); };
            const deletePhrase = (i) => { savedPhrases.value.splice(i, 1); localStorage.setItem('myPhrases', JSON.stringify(savedPhrases.value)); showToast('已刪除'); };

            return { currentText, savedPhrases, isListening, toastMessage, toggleSpeech, saveToDatabase, deletePhrase, copyText, exportDatabase, importDatabase, triggerFileInput };
        }
    }).mount('#app');
</script>
</body>
</html>
