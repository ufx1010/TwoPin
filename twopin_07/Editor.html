<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字編輯器</title>
  <style>
    body { margin:0; height:100vh; display:flex; flex-direction:column; font-family:sans-serif; }
    .editor-container { flex:1; display:flex; margin:5px; border:1px solid #ccc; border-radius:8px; background:#fff; overflow:hidden; }
    .line-numbers { background:#eee; color:#888; padding:10px 5px; text-align:right; width:35px; font-family:monospace; font-size:18px; line-height:1.5; border-right:1px solid #ccc; overflow:hidden; }
    #editor { flex:1; border:none; padding:10px; font-size:18px; font-family:monospace; line-height:1.5; resize:none; outline:none; overflow:auto; }
    .toolbar { display:flex; flex-direction:column; gap:5px; padding:5px; background:#fff; border-top:1px solid #ccc; }
    .row { display:flex; gap:5px; }
    /* 功能鍵顏色統一為淺藍 */
    .btn { flex:1; height:40px; padding:8px; font-size:14px; border:1px solid #ccc; border-radius:6px; background: #e0f7fa; cursor:pointer; }
    .editable-field { flex:1; height:40px; padding:10px; font-size:14px; border:1px solid #ccc; border-radius:6px; background: #fff; display: flex; align-items: center; box-sizing: border-box; overflow:hidden; }
    .editable-field:empty:before { content: attr(data-placeholder); color: #aaa; }
    .btn-danger { background:#ffcdd2; border:1px solid #e57373; }
    #statusMsg { font-size:13px; text-align:center; height: 22px; padding: 2px 5px; color: #333; background: #f9f9f9; border-bottom: 1px solid #ddd; font-weight: bold; }
  </style>
</head>
<body>
  <div class="editor-container">
    <div id="lineNumbers" class="line-numbers">1</div>
    <textarea id="editor" wrap="off" oninput="updateLineNumbers(); saveHistory();" onscroll="syncScroll()"></textarea>
  </div>
  <div class="toolbar">
    <div id="statusMsg">系統就緒</div>
    <div class="row">
      <div id="findStr" class="editable-field" contenteditable="true" data-placeholder="搜尋"></div>
      <button class="btn" onclick="findNext()">下一個</button>
    </div>
    <div class="row">
      <div id="replaceStr" class="editable-field" contenteditable="true" data-placeholder="取代"></div>
      <button class="btn" onclick="replaceText(false)">取代首個</button>
      <button class="btn" onclick="replaceText(true)">全部取代</button>
    </div>
    <div class="row">
      <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
      <button class="btn" onclick="document.getElementById('fileInput').click()">匯入</button>
      <button class="btn" onclick="exportFile()">匯出</button>
      <button class="btn" onclick="toggleWrap()">換行</button>
    </div>
    <div class="row">
      <button class="btn" onclick="clearText()">清空</button>
      <button class="btn btn-danger" onclick="undo()">復原上一步</button>
    </div>
  </div>

  <script>
    const editor = document.getElementById("editor");
    const lineNumbers = document.getElementById("lineNumbers");
    const statusMsg = document.getElementById("statusMsg");
    const findStrEl = document.getElementById("findStr");
    const replaceStrEl = document.getElementById("replaceStr");
    
    let wrapMode = "off";
    let currentFileName = "export.txt";
    let historyStack = []; // 儲存歷史紀錄

    function setStatus(msg, isError = false) { 
      statusMsg.innerText = msg; 
      statusMsg.style.color = isError ? "#d32f2f" : "#0277bd";
    }

    function saveHistory() {
      historyStack.push(editor.value);
      if (historyStack.length > 20) historyStack.shift(); // 最多儲存20步
    }

    function undo() {
      if (historyStack.length > 1) {
        historyStack.pop(); // 移除當前狀態
        editor.value = historyStack[historyStack.length - 1];
        updateLineNumbers();
        setStatus("已復原上一步");
      } else {
        setStatus("已無動作可復原", true);
      }
    }

    function syncScroll() { lineNumbers.scrollTop = editor.scrollTop; }

    function updateLineNumbers() {
      if (wrapMode === "soft") return;
      const lines = editor.value.split("\n").length;
      lineNumbers.innerText = Array.from({length:lines},(_,i)=>i+1).join("\n");
      syncScroll();
    }

    function toggleWrap() {
      if (wrapMode === "soft") {
        editor.value = editor.value.replace(/《\d+》/g, "");
        editor.setAttribute("wrap", "off");
        editor.style.whiteSpace = "pre";
        lineNumbers.style.display = "block";
        wrapMode = "off";
        updateLineNumbers();
        setStatus("已關閉換行");
      } else {
        let lines = editor.value.split("\n");
        editor.value = lines.map((line, i) => "《" + (i + 1) + "》" + line.replace(/《\d+》/g, "")).join("\n");
        editor.setAttribute("wrap", "soft");
        editor.style.whiteSpace = "pre-wrap";
        lineNumbers.style.display = "none";
        wrapMode = "soft";
        setStatus("已開啟換行並寫入編號");
      }
      saveHistory();
    }

    function findNext() {
      const str = findStrEl.innerText.trim();
      if (!str) return setStatus("請輸入搜尋內容", true);
      let pos = editor.value.indexOf(str, editor.selectionEnd);
      if (pos === -1) {
        pos = editor.value.indexOf(str, 0);
      }
      if (pos !== -1) {
        editor.focus();
        editor.setSelectionRange(pos, pos + str.length);
        setStatus("搜尋到關鍵字");
      } else {
        setStatus("找不到該關鍵字", true);
      }
    }

    function replaceText(isAll) {
      const find = findStrEl.innerText;
      const replace = replaceStrEl.innerText;
      if (!find) return setStatus("請輸入搜尋內容", true);
      
      let count = 0;
      if (isAll) {
        count = editor.value.split(find).length - 1;
        const regex = new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
        editor.value = editor.value.replace(regex, replace);
      } else {
        const pos = editor.value.indexOf(find);
        if (pos !== -1) {
          editor.value = editor.value.substring(0, pos) + replace + editor.value.substring(pos + find.length);
          count = 1;
        }
      }
      updateLineNumbers();
      saveHistory();
      setStatus(count > 0 ? "已取代 " + count + " 處" : "未找到內容", count === 0);
    }

    function uploadFile() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return;
      currentFileName = file.name;
      const reader = new FileReader();
      reader.onload = e => {
        editor.value = e.target.result;
        updateLineNumbers();
        saveHistory();
        setStatus("已匯入：" + currentFileName);
      };
      reader.readAsText(file);
    }

    function exportFile() {
      let fileName = prompt("請輸入要儲存的檔名：", currentFileName);
      if (fileName === null) return;
      currentFileName = fileName;
      const blob = new Blob([editor.value], {type:"text/plain"});
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = currentFileName;
      link.click();
      URL.revokeObjectURL(link.href);
      setStatus("已匯出：" + currentFileName);
    }

    function clearText() { editor.value = ""; updateLineNumbers(); saveHistory(); setStatus("內容已清空"); }
    
    // 初始化
    saveHistory();
    updateLineNumbers();
  </script>
</body>
</html>
