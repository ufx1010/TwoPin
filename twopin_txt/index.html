<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我的歌詞本</title>
<style>
  :root { --bg:#faf7f2; --card:#fff; --text:#2c2c2c; --accent:#d97757; }
  *{box-sizing:border-box}
  body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  
  header{position:sticky;top:0;z-index:40;padding:12px 16px;background:var(--card);display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  header .title-container{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center}
  header h1{margin:0;font-size:18px}
  .page-indicator{font-size:12px;color:#888;margin-top:2px}
  header button{background:none;border:none;font-size:22px;cursor:pointer}
  
  .menu{position:fixed;inset:0;background:var(--bg);padding:60px 20px;display:none;z-index:50;flex-direction:column;overflow-y:auto}
  .menu.active{display:flex}
  .song-item{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:18px;margin-bottom:12px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,.05)}
  .song-item span{flex:1;font-size:17px;font-weight:500;padding-right:10px}
  .btn-group{display:flex;gap:10px}
  
  .pagination{display:flex;justify-content:center;align-items:center;gap:15px;margin:20px 0}
  .pagination button{padding:8px 16px;border:none;border-radius:8px;background:#e0dcd5;cursor:pointer}
  
  main{flex:1;padding:20px;display:flex;justify-content:center}
  .card{width:100%;max-width:680px;background:var(--card);border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.05)}
  .song h2{text-align:center;font-size:18px;margin-top:0;color:#555}
  
  .line{padding:8px 0;border-bottom:1px dashed #eee}
  .line.bracket{color:#aaa; font-style:italic; border-bottom:none; margin-top:10px; text-align:center}
  .en{display:block;font-style:italic}
  .zh{display:block;margin-top:2px;color:#555}
</style>
</head>
<body>
<header>
  <div style="width:30px"></div>
  <div class="title-container">
    <h1 id="title">我的歌詞本</h1>
    <div id="pageInfo" class="page-indicator"></div>
  </div>
  <button id="menuBtn">☰</button>
</header>

<div class="menu" id="menu">
  <div style="text-align:right; margin-bottom:20px;"><button onclick="document.getElementById('menu').classList.remove('active')" style="font-size:24px;border:none;background:none;">✕</button></div>
  <div id="songList"></div>
  <div class="pagination" id="pagination"></div>
  
  <button id="addBtn" style="margin-top:10px; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-size:16px;">＋ 新增歌詞</button>
  <div style="display:flex; gap:10px; margin-top:10px;">
    <button onclick="exportData()" style="flex:1; padding:10px; background:#666; color:white; border:none; border-radius:8px;">匯出資料</button>
    <button onclick="document.getElementById('fileInput').click()" style="flex:1; padding:10px; background:#666; color:white; border:none; border-radius:8px;">匯入資料</button>
    <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importData(event)">
  </div>
</div>

<main id="main"><div class="card" id="card"></div></main>

<script>
let songs = JSON.parse(localStorage.getItem('songs_v4')||'[]');
let current = 0;
let editIndex = -1;
let page = 0;
const itemsPerPage = 10;

function save(){ localStorage.setItem('songs_v4',JSON.stringify(songs)); }

function exportData(){
  let fileName = prompt("請輸入要儲存的檔名 (不需包含副檔名):", "my_songs");
  if(fileName !== null){
    fileName = (fileName.trim() === "") ? "my_songs" : fileName;
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(songs));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href", dataStr);
    dlAnchorElem.setAttribute("download", fileName + ".json");
    dlAnchorElem.click();
  }
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    songs = JSON.parse(e.target.result);
    save();
    current=0; page=0; render();
    alert('資料匯入成功！');
  };
  reader.readAsText(file);
}

function render(){
  const s = songs[current] || {title:'尚未新增歌詞', sections:[{lines:[]}]};
  document.getElementById('title').textContent = s.title;
  
  const currentPage = Math.floor(current / itemsPerPage) + 1;
  const currentIdxInPage = (current % itemsPerPage) + 1;
  document.getElementById('pageInfo').textContent = songs.length > 0 ? `第 ${currentPage} 頁 / 第 ${currentIdxInPage} 首` : '';

  let html = `<div class="song"><h2>${s.title}</h2>`;
  s.sections.forEach(sec => {
    sec.lines.forEach(l => {
      const isBracket = l.en.trim().startsWith('[') && l.en.trim().endsWith(']');
      html += `<div class="${isBracket ? 'line bracket' : 'line'}">
        <span class="en">${l.en}</span>
        ${isBracket ? '' : '<span class="zh">'+(l.zh||'')+'</span>'}
      </div>`;
    });
  });
  document.getElementById('card').innerHTML = html + '</div>';
  renderMenu();
}

function renderMenu(){
  const list = document.getElementById('songList');
  const pag = document.getElementById('pagination');
  const totalPages = Math.ceil(songs.length / itemsPerPage) || 1;
  const start = page * itemsPerPage;
  const pageSongs = songs.slice(start, start + itemsPerPage);
  
  list.innerHTML = pageSongs.map((s,i)=>{
    const globalIdx = start + i;
    return `
    <div class="song-item">
      <span onclick="current=${globalIdx};render();document.getElementById('menu').classList.remove('active')">${s.title}</span>
      <div class="btn-group">
        <button onclick="editSong(${globalIdx})" style="border:none;background:none;font-size:18px;">✎</button>
        <button onclick="songs.splice(${globalIdx},1);save();current=0;page=0;render()" style="border:none;background:none;font-size:18px;">🗑️</button>
      </div>
    </div>`;
  }).join('');
    
  pag.innerHTML = `
    <button ${page===0?'disabled':''} onclick="page--;renderMenu()">上一頁</button>
    <span style="font-weight:bold">第 ${page+1} / ${totalPages} 頁</span>
    <button ${ (page+1) >= totalPages ? 'disabled':'' } onclick="page++;renderMenu()">下一頁</button>
  `;
}

const editor = document.createElement('div');
editor.style.cssText = 'position:fixed;inset:0;background:white;z-index:100;padding:20px;display:none;flex-direction:column;';
editor.innerHTML = `<h3 id="editorTitle">編輯歌詞</h3><textarea id="txtArea" style="flex:1;width:100%;padding:10px;"></textarea><button id="saveNew" style="padding:15px;background:var(--accent);color:white;border:none;border-radius:8px;margin-top:10px">儲存</button><button id="closeNew" style="padding:10px;margin-top:5px;background:none;border:none">取消</button>`;
document.body.appendChild(editor);

function editSong(i) {
  editIndex = i;
  document.getElementById('editorTitle').textContent = '修改歌詞';
  document.getElementById('txtArea').value = songs[i].title + '\n' + songs[i].sections[0].lines.map(l=>l.en).join('\n');
  editor.style.display='flex'; 
  document.getElementById('menu').classList.remove('active');
}

document.getElementById('addBtn').onclick = () => { 
  editIndex = -1;
  document.getElementById('editorTitle').textContent = '新增歌詞';
  document.getElementById('txtArea').value = '';
  editor.style.display='flex'; 
  document.getElementById('menu').classList.remove('active'); 
};
document.getElementById('closeNew').onclick = () => editor.style.display='none';
document.getElementById('saveNew').onclick = () => {
  const text = document.getElementById('txtArea').value;
  const lines = text.split('\n').filter(l=>l.trim()!=='');
  if(lines.length>0){
    const newSong = {title:lines[0], sections:[{lines:lines.slice(1).map(l=>({en:l,zh:''}))}]};
    if(editIndex === -1) songs.push(newSong);
    else songs[editIndex] = newSong;
    save(); 
    current = (editIndex === -1) ? songs.length-1 : editIndex; 
    page = Math.floor(current / itemsPerPage); 
    render();
  }
  editor.style.display='none';
};

document.getElementById('menuBtn').onclick = () => document.getElementById('menu').classList.toggle('active');
render();
</script>
</body>
</html>
