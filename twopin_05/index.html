<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>中英文單字配對遊戲</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&family=Schoolbell&family=Architects+Daughter&family=Short+Stack&family=Fredoka+One&family=Nunito:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --en-font-family:'Patrick Hand', -apple-system, 'Segoe UI', Roboto, sans-serif;
    --vowel-color-a:#ff1a1a;
    --vowel-color-e:#00c853;
    --vowel-color-i:#2979ff;
    --vowel-color-o:#ff6d00;
    --vowel-color-u:#d500f9;
    --board:#1f4d44;
    --board-deep:#163d35;
    --chalk:#f4ecd8;
    --card:#fffdf6;
    --card-edge:#e8dfc7;
    --pin-yellow:#e8b339;
    --pin-coral:#e0654f;
    --pin-blue:#4f8fe0;
    --pin-mint:#5fc7a5;
    --ink:#22302c;
    --good:#5fc78a;
    --bad:#e0654f;
    --shadow: 0 10px 22px -10px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(255,255,255,.05), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 1px, transparent 1px, transparent 3px),
      var(--board);
    color:var(--chalk);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:max(16px, env(safe-area-inset-top)) 16px 28px;
    overflow-x:hidden;
  }
  .wrap{max-width:980px;margin:0 auto;}

  /* ---------- Header / signature element ---------- */
  header.top{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:12px;margin:6px 4px 22px;flex-wrap:wrap;
  }
  .brand{display:flex;flex-direction:column;}
  .brand .tag{
    font-family:'Patrick Hand', -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size:13px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--pin-yellow);opacity:.9;margin-bottom:2px;
  }
  .brand h1{
    font-family:'Caveat', -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-weight:700;
    font-size:clamp(34px,7vw,52px);
    margin:0;line-height:.95;
    color:var(--chalk);
    text-shadow:0 2px 0 rgba(0,0,0,.15);
  }
  .brand h1 .accent{color:var(--pin-coral);}

  .stat-strip{
    display:flex;gap:10px;flex-wrap:wrap;
  }
  .stat-chip{
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.14);
    border-radius:10px;
    padding:7px 12px;
    font-size:12.5px;
    display:flex;flex-direction:column;align-items:flex-start;
    min-width:64px;
  }
  .stat-chip b{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--chalk);}
  .stat-chip span{opacity:.65;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;}

  /* ---------- Screens ---------- */
  .screen{display:none;}
  .screen.active{display:block;}

  /* ---- Start screen ---- */
  .start-card{
    background:var(--card);
    color:var(--ink);
    border-radius:18px;
    padding:22px 20px 20px;
    box-shadow:var(--shadow);
    position:relative;
    border:1px solid var(--card-edge);
    max-width:420px;
    margin:14px auto 10px;
  }
  .start-card::before{
    content:"";position:absolute;top:-13px;left:50%;transform:translateX(-50%) rotate(-3deg);
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff7d6, var(--pin-yellow) 60%, #b9851d 100%);
    box-shadow:0 4px 8px rgba(0,0,0,.35);
  }
  .start-card h2{
    font-family:'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
    font-size:30px;margin:4px 0 4px;color:var(--ink);
  }
  .start-card p.sub{margin:0 0 14px;font-size:13px;color:#5b665f;line-height:1.5;}
  .field-label{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#7a8278;margin:0 0 8px;}
  .count-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
  .count-grid-3{grid-template-columns:repeat(3,1fr);}
  .count-grid-4{grid-template-columns:repeat(4,1fr);}
  input.custom-input{
    text-align:center;width:100%;-webkit-appearance:none;appearance:none;
  }
  input.custom-input::placeholder{color:#a9b0a4;font-weight:600;}
  .diff-grid{grid-template-columns:repeat(4,1fr);}
  .diff-sub{font-size:10.5px;font-weight:500;opacity:.65;display:block;margin-top:2px;}
  .start-card.state-ok .diff-btn.selected,
  .start-card.state-ok .syll-btn.selected,
  .start-card.state-ok .count-btn.selected,
  .start-card.state-ok .letter-toggle,
  .start-card.state-ok #startBtn{
    background:var(--board) !important;border-color:var(--board) !important;color:var(--chalk) !important;
    box-shadow:none !important;
  }
  .start-card.state-ok .letter-toggle .arrow{color:var(--chalk) !important;}
  .start-card.state-bad .diff-btn.selected,
  .start-card.state-bad .syll-btn.selected,
  .start-card.state-bad .count-btn.selected,
  .start-card.state-bad .letter-toggle,
  .start-card.state-bad #startBtn{
    background:var(--pin-coral) !important;border-color:var(--pin-coral) !important;color:var(--chalk) !important;
    box-shadow:none !important;
  }
  .start-card.state-bad .letter-toggle .arrow{color:var(--chalk) !important;}

  .letter-toggle{
    width:100%;text-align:left;padding:11px 14px;border-radius:11px;border:2px solid var(--card-edge);
    background:#fbf8ee;color:var(--ink);font-family:'Inter',sans-serif;font-weight:700;font-size:14px;
    margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  }
  .letter-toggle .arrow{transition:transform .15s ease;color:#8b9389;}
  .letter-toggle.open .arrow{transform:rotate(180deg);}
  .toggle-row-3{display:flex;gap:6px;margin-bottom:10px;}
  .toggle3-btn{
    flex:1;padding:10px 6px;border-radius:11px;border:2px solid var(--card-edge);
    background:#fbf8ee;color:var(--ink);font-family:'Inter',sans-serif;font-weight:700;font-size:12px;
    cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:4px;
    transition:border-color .12s ease, background .12s ease;
  }
  .toggle3-btn .arrow{transition:transform .15s ease;color:#8b9389;font-size:11px;}
  .toggle3-btn.open .arrow{transform:rotate(180deg);}
  .toggle3-btn.open{border-color:var(--board);}
  .font-grid-3x3{
    display:none;
    grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;
  }
  .font-grid-3x3.open{display:grid;}
  .vowel-inline-picker{
    display:none;
    background:#f5f0e8;border-radius:10px;padding:10px 12px;margin-bottom:10px;
  }
  .vowel-inline-picker.open{display:block;}
  .vowel-picker-title{
    font-size:12px;font-weight:700;color:#7a8278;text-transform:uppercase;letter-spacing:.06em;
    display:block;margin-bottom:8px;
  }
  .vowel-swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
  .vc-swatch-inline{
    width:22px;height:22px;border-radius:50%;border:3px solid transparent;cursor:pointer;
    box-shadow:0 0 0 1px var(--card-edge) inset;flex-shrink:0;
  }
  .vc-swatch-inline.selected{border-color:var(--ink);}
  .vc-swatch-inline-none{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--card-edge);
    background:#eee7d4;color:#7a8278;font-size:9px;font-weight:700;font-family:'Inter',sans-serif;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .vc-swatch-inline-none.selected{border-color:var(--ink);}
  .letter-btn.is-vowel{font-weight:900;}
  #fontGrid{display:none;}
  #fontGrid.open{display:grid;}
  .vowel-color-rows{display:none;margin-bottom:10px;}
  .vowel-color-rows.open{display:block;}
  .color-settings-panel{
    display:none;background:#f5f0e8;border-radius:12px;padding:10px;margin-bottom:10px;
  }
  .color-settings-panel.open{display:block;}
  .color-letter-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px;
  }
  .color-letter-btn{
    font-family:'Inter',sans-serif;font-weight:800;font-size:13px;
    padding:7px 2px;border-radius:7px;border:2px solid transparent;
    background:#fbf8ee;cursor:pointer;text-align:center;
    transition:border-color .12s ease, background .12s ease;
    position:relative;
  }
  .color-letter-btn.active{
    border-color:var(--ink);background:#fff;
  }
  .letter-grid{
    display:none;
    grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px;
  }
  .letter-grid.open{display:grid;}
  .letter-btn{
    font-family:'Inter',sans-serif;font-weight:700;font-size:12px;
    padding:7px 2px;border-radius:7px;border:2px solid var(--card-edge);
    background:#fbf8ee;color:var(--ink);cursor:pointer;text-align:center;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .letter-btn.selected{
    border-color:var(--board);background:var(--board);color:var(--chalk);
  }
  .vc-row{
    display:flex;align-items:center;gap:8px;margin-bottom:7px;
  }
  .vc-label{
    width:22px;height:22px;border-radius:6px;background:var(--card-edge);
    display:flex;align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;font-weight:800;font-size:13px;color:var(--ink);
    flex-shrink:0;
  }
  .vc-swatches{display:flex;gap:6px;flex:1;}
  .vc-swatch{
    flex:1;aspect-ratio:1/1;max-width:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;
    box-shadow:0 0 0 1px var(--card-edge) inset;
  }
  .vc-swatch.selected{border-color:var(--ink);transform:scale(1.12);}
  .vc-swatch-none{
    background:#eee7d4;color:#7a8278;font-size:9.5px;font-weight:700;font-family:'Inter',sans-serif;
    display:flex;align-items:center;justify-content:center;
  }
  .count-btn{
    font-family:'Inter',sans-serif;font-weight:700;font-size:14px;
    padding:9px 4px;border-radius:10px;border:2px solid var(--card-edge);
    background:#fbf8ee;color:var(--ink);cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .count-btn:hover{transform:translateY(-2px);}
  .count-btn.selected{
    border-color:var(--board);background:var(--board);color:var(--chalk);
  }
  .custom-row{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .custom-row input[type=number]{
    width:90px;padding:10px 10px;border-radius:9px;border:2px solid var(--card-edge);
    font-size:15px;font-family:'Inter',sans-serif;font-weight:600;color:var(--ink);background:#fbf8ee;
  }
  .custom-row label{font-size:13px;color:#5b665f;}
  .pool-note{font-size:12px;color:#8b9389;margin:-8px 0 20px;}
  .warn-note{font-size:13px;color:#c8392b;font-weight:700;margin:-14px 0 16px;display:none;}
  .warn-note.active{display:block;}
  .custom-words-toggle{
    width:100%;margin-top:10px;padding:11px 14px;border-radius:11px;
    border:2px dashed var(--card-edge);background:#fbf8ee;color:var(--ink);
    font-family:'Inter',sans-serif;font-weight:700;font-size:13.5px;
    cursor:pointer;display:flex;justify-content:space-between;align-items:center;
    transition:border-color .12s, background .12s;
  }
  .custom-words-toggle .arrow{transition:transform .15s;color:#8b9389;}
  .custom-words-toggle.open{border-color:var(--board);background:#f0f8f5;}
  .custom-words-toggle.open .arrow{transform:rotate(180deg);}
  .custom-words-panel{display:none;margin-top:8px;}
  .custom-words-panel.open{display:block;}
  .custom-words-hint{font-size:12px;color:#6b7a6e;line-height:1.6;margin:0 0 8px;}
  .custom-words-hint b{color:var(--ink);}
  .custom-words-hint code{background:#eee7d4;border-radius:4px;padding:1px 5px;font-size:11px;}
  .custom-words-textarea{
    width:100%;border-radius:10px;border:2px solid var(--card-edge);
    background:#fbf8ee;color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;
    padding:10px 12px;line-height:1.6;resize:vertical;
  }
  .custom-words-btns{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
  .custom-words-clear{
    padding:7px 14px;border-radius:8px;border:1px solid var(--card-edge);
    background:#fbf8ee;color:#7a8278;font-size:12px;font-weight:600;cursor:pointer;
  }
  .custom-words-count{font-size:12px;color:#7a8278;flex:1;}
  .custom-words-only-label{font-size:12px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:5px;cursor:pointer;}
  .mic-btn{
    flex:1;padding:8px 6px;border-radius:11px;border:2px solid rgba(255,255,255,.25);
    background:transparent;color:var(--chalk);font-size:16px;cursor:pointer;line-height:1;
    transition:background .12s, border-color .12s;text-align:center;
  }
  .mic-btn.listening{background:#fde8e8;border-color:#ff1a1a;animation:pulse-mic 1.2s ease infinite;}
  @keyframes pulse-mic{0%,100%{opacity:1;}50%{opacity:.5;}}
  .voice-glow-green{
    background:#d6f5e3 !important;border:2.5px solid #00c853 !important;
    box-shadow:0 0 0 4px rgba(0,200,83,.35) !important;
  }100%{opacity:0;visibility:hidden;}}
  .mic-match-flash{animation:mic-flash .4s ease;}
  @keyframes mic-flash{0%{background:#ffe082;}100%{background:var(--card);}}
  .start-row{display:flex;gap:6px;align-items:stretch;}
  .start-btn{
    flex:2;padding:16px 8px;border:none;border-radius:13px;
    background:linear-gradient(180deg, #2c6358, var(--board));
    color:var(--chalk);font-family:'Inter',sans-serif;font-weight:800;font-size:17px;
    letter-spacing:.02em;cursor:pointer;box-shadow:0 10px 18px -8px rgba(31,77,68,.6);
    transition:transform .12s ease;
  }
  .start-btn:active{transform:scale(.98);}
  .vis-btns{display:contents;}
  .vis-btn{
    flex:1;padding:10px 4px;border-radius:13px;border:2px solid var(--card-edge);
    background:#fbf8ee;color:#7a8278;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;
    cursor:pointer;transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .vis-btn.active{background:var(--board);color:var(--chalk);border-color:var(--board);}
  .vis-btn:not(.active){text-decoration:line-through;opacity:.6;}
  .sound-note{
    text-align:center;font-size:12px;color:#8b9389;margin-top:12px;
  }

  /* ---- Game screen ---- */
  .hud{
    display:flex;align-items:center;
    margin:0 4px 16px;gap:6px;
  }
  .hud-left{display:flex;gap:6px;flex:3;}
  .hud-left .pill{flex:1;justify-content:center;}
  .pill{
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums;
  }
  .pill .dot{width:7px;height:7px;border-radius:50%;}
  .pill.timer .dot{background:var(--pin-yellow);}
  .pill.matched .dot{background:var(--good);}
  .pill.miss .dot{background:var(--bad);}
  .hud-right{display:flex;gap:6px;flex:2;}
  .quit-btn{
    flex:1;background:transparent;border:1px solid rgba(255,255,255,.25);color:var(--chalk);
    border-radius:999px;padding:7px 6px;font-size:13px;cursor:pointer;font-weight:600;text-align:center;
  }

  .board{
    display:grid;
    grid-template-columns:repeat(var(--cols,4),1fr);
    gap:10px;
  }
  .card{
    position:relative;
    aspect-ratio:1/1;
    background:var(--card);
    border-radius:12px;
    border:1px solid var(--card-edge);
    display:flex;align-items:center;justify-content:center;
    text-align:center;
    padding:8px 6px;
    cursor:pointer;
    overflow:hidden;
    box-shadow:0 6px 14px -8px rgba(0,0,0,.5);
    transform:rotate(var(--r,0deg));
    transition:transform .15s ease, box-shadow .15s ease, background .18s ease, opacity .35s ease, visibility .35s;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .card .txt{
    font-size:clamp(12px,2.6vw,16px);
    line-height:1.3;color:var(--ink);font-weight:600;
    overflow-wrap:normal;word-break:normal;white-space:normal;text-align:center;
  }
  .card.zh .txt{font-family:'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', 'Heiti TC', sans-serif;font-weight:700;font-size:clamp(15px,3.2vw,20px);display:flex;flex-direction:column;align-items:center;gap:2px;}
  .zh-line{font-size:clamp(13px,2.8vw,17px);font-weight:700;white-space:normal;word-break:keep-all;overflow-wrap:normal;}
  .ph-text{font-size:clamp(14px,3.1vw,19px);font-weight:500;color:#444;font-family:'Noto Serif','Times New Roman',serif;white-space:normal;word-break:break-word;line-height:1.2;letter-spacing:.03em;}
  .bracket-text{font-size:.85em;opacity:.75;font-style:italic;}
  .zh-ta-rotate{display:inline-flex;flex-direction:column;align-items:center;gap:2px;transform:rotate(-45deg);}
  .card.en .txt{font-family:var(--en-font-family);font-size:clamp(19px,4.4vw,28px);font-weight:400;letter-spacing:.04em;overflow-wrap:normal;word-break:normal;}
  .card.en .txt.diagonal{
    display:inline-block;
    white-space:nowrap;
    transform:rotate(-45deg);
    font-size:clamp(17px,4vw,23px);
    letter-spacing:.02em;
  }
  .v-a{color:var(--vowel-color-a);font-weight:var(--vowel-weight,800);}
  .v-e{color:var(--vowel-color-e);font-weight:var(--vowel-weight,800);}
  .v-i{color:var(--vowel-color-i);font-weight:var(--vowel-weight,800);}
  .v-o{color:var(--vowel-color-o);font-weight:var(--vowel-weight,800);}
  .v-u{color:var(--vowel-color-u);font-weight:var(--vowel-weight,800);}
  .card:hover{transform:rotate(var(--r,0deg)) translateY(-3px);}
  .card.selected{
    background:#fff3b0;border:3px solid #c98a00;
    box-shadow:0 0 0 4px rgba(232,179,57,.55), 0 10px 20px -8px rgba(0,0,0,.55);
    transform:rotate(0deg) translateY(-4px) scale(1.06);
  }
  .card.correct{
    background:#e3f9ee;border-color:var(--good);
    box-shadow:0 0 0 3px rgba(95,199,138,.5);
  }
  .card.wrong{
    background:#fde7e2;border-color:var(--bad);
    animation:shake .35s ease;
    box-shadow:0 0 0 3px rgba(224,101,79,.5);
  }
  .card.cleared{
    opacity:0;visibility:hidden;pointer-events:none;transform:scale(.7) rotate(0deg);
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }
  .speaker{
    position:absolute;bottom:4px;right:6px;font-size:10px;opacity:.35;
  }

  /* ---- End modal ---- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(10,20,18,.72);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal-bg.active{display:flex;}
  .modal{
    background:var(--card);color:var(--ink);border-radius:18px;
    padding:30px 26px;max-width:380px;width:100%;text-align:center;
    box-shadow:0 20px 50px -16px rgba(0,0,0,.6);
    position:relative;
  }
  .modal .emoji{font-size:42px;display:block;margin-bottom:6px;}
  .modal h2{font-family:'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;font-size:30px;margin:0 0 18px;}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
  .result-item{background:#fbf8ee;border:1px solid var(--card-edge);border-radius:11px;padding:12px 8px;}
  .result-item b{display:block;font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;}
  .result-item span{font-size:11px;color:#7a8278;text-transform:uppercase;letter-spacing:.06em;}
  .modal-btns{display:flex;gap:10px;}
  .modal-btns button{
    flex:1;padding:13px;border-radius:11px;border:none;font-weight:700;font-size:14.5px;cursor:pointer;
  }
  .btn-again{background:var(--board);color:var(--chalk);}
  .btn-home{background:#eee7d4;color:var(--ink);}

  @media (max-width:560px){
    .board{--cols:3 !important;}
    .count-grid{grid-template-columns:repeat(4,1fr);}
  }
  @media (max-width:380px){
    .board{--cols:3 !important; gap:8px;}
  }

</div>

function letterCount(en){
  return (en.match(/[a-zA-Z]/g) || []).length;
}
function matchesDifficulty(en, diff){
  if(diff === 'all') return true;
  const n = letterCount(en);
  if(diff === 'easy') return n <= 4;
  if(diff === 'medium') return n >= 5 && n <= 7;
  return n >= 8;
}

function matchesLetter(en, letter){
  if(letter === 'all') return true;
  const cleaned = en.match(/[a-zA-Z]/);
  if(!cleaned) return false;
  return cleaned[0].toUpperCase() === letter;
}

function countSyllables(word){
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if(!word) return 0;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const matches = word.match(/[aeiouy]{1,2}/g);
  return matches ? matches.length : 1;
}
function matchesSyllable(en, syll){
  if(syll === 'all') return true;
  const s = countSyllables(en);
  if(syll === '1') return s <= 1;
  if(syll === '2') return s === 2;
  return s >= 3;
}

function matchesAllFilters(w){
  return matchesDifficulty(w.en, selectedDifficulty)
      && matchesLetter(w.en, selectedLetter)
      && matchesSyllable(w.en, selectedSyllable);
}

const VOWELS = ['a','e','i','o','u'];
const ALL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

const currentLetterColors = {}; // color for every A-Z letter
let currentPickerLetter = 'A';

function applyLetterColor(letter, color){
  currentLetterColors[letter] = color;
  const v = letter.toLowerCase();
  if(VOWELS.includes(v)){
    document.documentElement.style.setProperty('--vowel-color-'+v, color === 'none'||!color ? 'inherit' : color);
  }
  updateVowelToggleLabel();
  // update the color-letter-grid button
  const cb = document.querySelector('#colorLetterGrid .color-letter-btn[data-l="'+letter+'"]');
  if(cb){
    const displayColor = color && color !== 'none' ? color : '';
    cb.style.color = displayColor;
    cb.style.borderColor = displayColor || '';
  }
}

function buildColorSwatches(letter){
  currentPickerLetter = letter;
  const upper = letter.toUpperCase();
  const lower = letter.toLowerCase();
  document.getElementById('vowelPickerLabel').textContent = upper + ' 的顏色';
  const row = document.getElementById('vowelSwatchRow');
  row.innerHTML = '';
  const cur = currentLetterColors[letter] || null;
  vowelColorPalette.forEach(color=>{
    const sw = document.createElement('button');
    sw.className = 'vc-swatch-inline';
    sw.dataset.c = color;
    sw.style.background = color;
    if(cur && color.toLowerCase() === cur.toLowerCase()) sw.classList.add('selected');
    sw.addEventListener('click', ()=>{
      row.querySelectorAll('.vc-swatch-inline,.vc-swatch-inline-none').forEach(b=>b.classList.remove('selected'));
      sw.classList.add('selected');
      applyLetterColor(letter, color);
    });
    row.appendChild(sw);
  });
  const noneBtn = document.createElement('button');
  noneBtn.className = 'vc-swatch-inline-none';
  noneBtn.textContent = '無';
  if(!cur || cur === 'none') noneBtn.classList.add('selected');
  noneBtn.addEventListener('click', ()=>{
    row.querySelectorAll('.vc-swatch-inline,.vc-swatch-inline-none').forEach(b=>b.classList.remove('selected'));
    noneBtn.classList.add('selected');
    applyLetterColor(letter, 'none');
  });
  row.appendChild(noneBtn);
}

  const items = [...ALL_LETTERS, 'ˈ', 'ˌ'];
  items.forEach(letter=>{

    btn.className = 'color-letter-btn';
    if(letter === 'ˈ' || letter === 'ˌ') btn.style.cssText = 'font-size:16px;font-weight:900;';
    btn.dataset.l = letter;
    btn.textContent = letter;
    const c = currentLetterColors[letter];
    if(c && c !== 'none'){ btn.style.color = c; btn.style.borderColor = c; }
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#colorLetterGrid .color-letter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      buildColorSwatches(letter);
    });
    grid.appendChild(btn);
  });
}

function getAvailableCount(){
  const onlyCustom = document.getElementById('customWordsOnly') && document.getElementById('customWordsOnly').checked;
  const baseN = onlyCustom ? 0 : WORDS.filter(w=>matchesAllFilters(w)).length;
  return baseN + (customWords ? customWords.length : 0);
}

function updateDiffNote(){
  const n = getAvailableCount();
  const custom = customWords ? customWords.length : 0;
  let note = '目前篩選條件共 ' + n + ' 個單字可抽取';
  if(custom > 0) note += '（含 ' + custom + ' 個自訂）';
  note += '。';
  document.getElementById('diffNote').textContent = note;
  checkAvailability();
}
updateDiffNote();

function checkAvailability(){
  const n = getAvailableCount();
  const warnEl = document.getElementById('countWarning');
  const card = document.querySelector('.start-card');
  if(selectedCount > n){
    warnEl.textContent = '⚠ 目前篩選條件下只有 ' + n + ' 個單字，無法選擇 ' + selectedCount + ' 個，請減少數量或調整篩選條件。';
    warnEl.classList.add('active');
    card.classList.add('state-bad');
    card.classList.remove('state-ok');
    return false;
  } else {
    warnEl.classList.remove('active');
    card.classList.add('state-ok');
    card.classList.remove('state-bad');
    return true;
  }
}

function pickVoice(lang){
  if(!voicesList.length) return null;
  const base = lang.split('-')[0];
  return voicesList.find(v=>v.lang === lang)
      || voicesList.find(v=>v.lang && v.lang.toLowerCase().startsWith(base))
      || (base === 'zh' ? voicesList.find(v=>/zh|cmn|yue/i.test(v.lang||'')) : null);
}

const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';

function speak(text, lang, opts){
  opts = opts || {};
  if(window._muted){ if(opts.onEnd) setTimeout(opts.onEnd, 10); return; }
  if(!('speechSynthesis' in window)){
    console.warn('此瀏覽器不支援語音合成');
    return;
  }
  try{
    if(opts.interrupt !== false){
      window.speechSynthesis.cancel();
    }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = lang.startsWith('en') ? 0.82 : 0.88;
    u.volume = 1.0;
    u.pitch = 1.0;
    const v = pickVoice(lang);
    if(v) u.voice = v;
    if(opts.onEnd){
      u.onend = opts.onEnd;
      u.onerror = opts.onEnd;
    }
    const delay = opts.interrupt !== false ? 30 : 0;
    setTimeout(()=>{ window.speechSynthesis.speak(u); }, delay);
  }catch(err){
    console.warn('speak failed', err);
    if(opts.onEnd) opts.onEnd();
  }
}

let audioCtx = null;
function playBeep(){
  try{
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return;
      audioCtx = new Ctx();
    }
    const doBeep = ()=>{
      try{
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.setValueAtTime(160, now + 0.12);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.3, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.4);
      }catch(e){ console.warn('beep inner', e); }
    };
    if(audioCtx.state === 'suspended'){
      audioCtx.resume().then(doBeep).catch(doBeep);
    } else {
      doBeep();
    }
  }catch(err){
    console.warn('beep failed', err);
  }
}

// ---------- Game setup ----------
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ---------- Custom words ----------

function parseCustomWords(text){
  const result = [];
  const lines = text.split('\n');
  lines.forEach(line=>{
    line = line.trim();
    if(!line || line.startsWith('#')) return;
    // Only | is the field separator
    const pipeIdx = line.indexOf('|');
    if(pipeIdx < 0) return; // no | → skip
    const en = line.slice(0, pipeIdx).trim();
    if(!en) return;
    let rest = line.slice(pipeIdx + 1).trim();
    if(!rest) return;
    // extract phonetic [...] - check if there's a second | before [
    let ph = '';
    const secondPipe = rest.indexOf('|');
    if(secondPipe >= 0){
      const zhPart = rest.slice(0, secondPipe).trim();
      const phPart = rest.slice(secondPipe + 1).trim();
      const phMatch = phPart.match(/\[([^\]]+)\]/);
      if(phMatch) ph = phMatch[1].trim();
      rest = zhPart;
    } else {
      const phMatch = rest.match(/\[([^\]]+)\]/);
      if(phMatch){
        ph = phMatch[1].trim();
        rest = rest.replace(/\s*\[[^\]]*\]/, '').trim();
      }
    }
    const zh = rest;
    if(!zh) return;
    result.push({en, zh, ph, sc:zh, custom:true});
  });
  return result;
}

function startGame(){
  stopRepeatSpeak();
  const onlyCustom = document.getElementById('customWordsOnly').checked;
  const filtered = onlyCustom ? [] : WORDS.filter(w=>matchesAllFilters(w));
  const merged = customWords.length > 0 ? [...customWords, ...filtered] : filtered;
  const n = Math.min(selectedCount, merged.length);
  const pool = shuffle(merged.slice()).slice(0, n);
  pairs = pool.map((w,i)=>({id:'p'+i, en:w.en, zh:w.zh, ph:w.ph||''}));

  matchedCount = 0;
  wrongCount = 0;
  wrongWords = new Set();
  firstPick = null;
  locked = false;

  document.getElementById('totalVal').textContent = pairs.length;
  document.getElementById('matchedVal').textContent = '0';
  document.getElementById('missVal').textContent = '0';
  document.getElementById('timerVal').textContent = '00:00';

  let cells = [];
  let pairIdx = 0;
  pairDataMap = {}; // reset for new game
  pairs.forEach(p=>{
    const enParts = p.en.split(/\s*,\s*/);
    function speakText(t){ return t.replace(/\[([^\]]*)\]/g, '').trim(); }
    if(enParts.length > 1){
      enParts.forEach(part=>{
        const pid = 'p'+(pairIdx++);
        pairDataMap[pid] = {en: part, zh: p.zh};
        cells.push({pairId:pid, type:'en', text:part, speakText:speakText(part), ph:p.ph||''});
        cells.push({pairId:pid, type:'zh', text:p.zh, ph:p.ph||'', speakText:speakText(p.zh)});
      });
    } else {
      const pid = 'p'+(pairIdx++);
      pairDataMap[pid] = {en: p.en, zh: p.zh};
      cells.push({pairId:pid, type:'en', text:p.en, speakText:speakText(p.en), ph:p.ph||''});
      cells.push({pairId:pid, type:'zh', text:p.zh, ph:p.ph||'', speakText:speakText(p.zh)});
    }
  });
  shuffle(cells);

  // column count: aim for a roughly square-ish grid, cap for readability
  let cols = 4;
  const total = cells.length;
  if(total <= 8) cols = 4;
  else if(total <= 20) cols = 5;
  else if(total <= 40) cols = 6;
  else cols = 8;
  board.style.setProperty('--cols', cols);

  board.innerHTML = '';
  cells.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'card ' + c.type;
    el.dataset.pair = c.pairId;
    el.dataset.type = c.type;
    el.style.setProperty('--r', (Math.random()*4-2).toFixed(1)+'deg');
    el.dataset.text = c.text;
    el.dataset.speakText = c.speakText || c.text;
    if(c.ph) el.dataset.ph = c.ph;
    const hasSpaces = /\s/.test(c.text);
    const letterLen = c.text.replace(/[^a-zA-Z]/g,'').length;
    const isLongEn = c.type === 'en' && letterLen > 7;
    let inner, txtClass;
    if(c.type === 'en'){
      inner = renderEnglishWord(c.text, isLongEn, c.ph||'');
      txtClass = isLongEn ? 'txt diagonal' : 'txt';
    } else {
      inner = renderZhCard(c.text, c.ph||'');
      txtClass = 'txt';
    }
    el.innerHTML = '<span class="'+txtClass+'">'+inner+'</span><span class="speaker">🔊</span>';
    el.addEventListener('click', onCardClick);
    board.appendChild(el);
  });

  screenStart.classList.remove('active');
  screenGame.classList.add('active');

  startTimer();
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderPhonetic(ph){
  // colorize letters in phonetic using currentLetterColors
  let html = '';
  for(const ch of ph){
    const escapedCh = escapeHtml(ch);
    const upper = ch.toUpperCase();
    const color = currentLetterColors[upper];
    if(color && color !== 'none'){
      html += '<span style="color:'+color+'">'+escapedCh+'</span>';
    } else {
      html += escapedCh;
    }
  }
  return html;
}

function renderZhLine(zh){
  // split on [...] for forced line breaks; content inside shown but not spoken
  return zh.replace(/\[([^\]]*)\]/g, '<br><span class="bracket-text">$1</span>');
}

function renderZhCard(zh, ph){
  const zhHtml = renderZhLine(escapeHtml(zh));
  const showZh = window._showZh !== false;
  const showPh = window._showPh !== false;

  if(!ph || !showPh){
    if(!showZh) return '';
    const isLong = zh.replace(/\[[^\]]*\]/g,'').length > 5;
    return isLong ? '<span class="zh-ta-rotate">'+zhHtml+'</span>' : zhHtml;
  }

  const phHtml = '[<span class="ph-inner">'+renderPhonetic(ph)+'</span>]';
  const cleanZhLen = zh.replace(/\[[^\]]*\]/g,'').length;
  const isLong = cleanZhLen + ph.length > 9 || cleanZhLen > 4;

  if(!showZh){
    return isLong
      ? '<span class="zh-ta-rotate ph-only"><span class="ph-text">'+phHtml+'</span></span>'
      : '<span class="ph-text">'+phHtml+'</span>';
  }

  const body = '<span class="zh-line">'+zhHtml+'</span><span class="ph-text">'+phHtml+'</span>';
  return isLong
    ? '<span class="zh-ta-rotate">'+body+'</span>'
    : body;
}

function renderChineseWord(text){
  return escapeHtml(text);
}

function colorizeVowels(text){
  const escaped = escapeHtml(text);
  return escaped.replace(/[aeiouAEIOU]/g, ch=>{
    const cls = 'v-' + ch.toLowerCase();
    return '<span class="'+cls+'">'+ch+'</span>';
  });
}

function computeSyllableBreakPoints(word){
  // words with spaces (phrases) already wrap naturally at spaces; skip
  if(/\s/.test(word)) return [];
  // 7 letters or fewer always stay on one line
  if(word.replace(/[^a-zA-Z]/g,'').length <= 7) return [];
  const re = /[aeiouy]+/gi;
  const vowelGroups = [];
  let m;
  while((m = re.exec(word))){
    vowelGroups.push({start:m.index, end:m.index+m[0].length});
  }
  if(vowelGroups.length <= 1) return [];
  const points = [];
  for(let i=0;i<vowelGroups.length-1;i++){
    const gapStart = vowelGroups[i].end;
    const gapEnd = vowelGroups[i+1].start;
    const gapLen = gapEnd - gapStart;
    const splitAt = gapLen <= 0 ? gapStart : gapStart + Math.ceil(gapLen/2);
    if(splitAt > 0 && splitAt < word.length) points.push(splitAt);
  }
  return points;
}

function splitPhraseLines(word){
  const words = word.split(' ');
  if(words.length <= 1) return [word];
  const target = word.length * 0.6;
  let best = 1, bestDiff = Infinity, cumLen = 0;
  for(let i=0;i<words.length-1;i++){
    cumLen += words[i].length + 1;
    const diff = Math.abs(cumLen - target);
    if(diff < bestDiff){ bestDiff = diff; best = i+1; }
  }
  return [words.slice(0, best).join(' '), words.slice(best).join(' ')];
}

function colorizeLetter(ch){
  const esc = escapeHtml(ch);
  const color = currentLetterColors[ch.toUpperCase()];
  const isVowel = /[aeiouAEIOU]/.test(ch);
  const weight = isVowel ? ';font-weight:var(--vowel-weight,800)' : '';
  if(color && color !== 'none') return '<span style="color:'+color+weight+'">'+esc+'</span>';
  return esc;
}

function colorizeSegment(seg, skipBreaks){
  const breakPoints = skipBreaks ? [] : computeSyllableBreakPoints(seg);
  let html = '';
  for(let i=0;i<seg.length;i++){
    if(breakPoints.includes(i)) html += '<wbr>';
    html += colorizeLetter(seg[i]);
  }
  return html;
}

function renderEnglishWord(word, skipBreaks, ph){
  const hasSpaces = /\s/.test(word);
  const cleanLen = word.replace(/\[[^\]]*\]/g,'').length;

  // Split into 2 lines if phrase + diagonal + very long
  if(skipBreaks && hasSpaces && cleanLen > 15){
    const parts = splitPhraseLines(word.replace(/\[[^\]]*\]/g,'').trim());
    return parts.map(part=>colorizeSegment(part, true)).join('<br>');
  }

  // Handle [...] bracket annotation
  const segments = word.split(/(\[[^\]]*\])/);
  let html = '';
  segments.forEach(seg=>{
    if(seg.startsWith('[') && seg.endsWith(']')){
      html += '<br><span class="bracket-text">'+escapeHtml(seg.slice(1,-1))+'</span>';
      return;
    }
html += colorizeSegment(seg, skipBreaks);
  });
  return html;
}

// ── Voice recognition ─────────────────────────────────────────────────────
let voiceRecognition = null;
let voiceActive = false;

function strSimilarity(s1, s2){
  s1 = s1.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
  s2 = s2.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
  if(!s1||!s2) return 0;
  if(s1===s2) return 1;
  const m=s1.length, n=s2.length;
  const dp=Array.from({length:m+1},(_,i)=>{ const r=new Array(n+1).fill(0); r[0]=i; return r; });
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j]=s1[i-1]===s2[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    }
  }
  return (Math.max(m,n)-dp[m][n])/Math.max(m,n);
}

function initVoiceRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('此瀏覽器不支援語音辨識，請使用 Chrome'); return false; }
  voiceRecognition = new SR();
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = true;
  voiceRecognition.lang = 'en-US';

  voiceRecognition.onresult = (event)=>{
    const result = event.results[event.results.length-1];
    const transcript = result[0].transcript.toLowerCase().trim();
    const confidence = result[0].confidence;
    // Try to match visible en cards
    const cards = document.querySelectorAll('.card.en:not(.cleared)');
    let bestCard = null, bestScore = 0;
    cards.forEach(card=>{
      const cardText = card.dataset.speakText || card.dataset.text;
      const score = strSimilarity(transcript, cardText);
      if(score > bestScore){ bestScore = score; bestCard = card; }
    });
    if(bestScore >= 0.7 && bestCard && !bestCard.classList.contains('selected')){
      bestCard.classList.add('mic-match-flash');
      setTimeout(()=>bestCard.classList.remove('mic-match-flash'), 400);
      bestCard.click();
    }
  };

  voiceRecognition.onerror = (e)=>{ console.warn('voice error', e.error); };
  voiceRecognition.onend = ()=>{
    if(voiceActive) voiceRecognition.start(); // restart if still active
  };
  return true;
}

function toggleVoice(){
  const btn = document.getElementById('micBtn');
  if(!btn) return;
  if(!voiceActive){
    if(!voiceRecognition && !initVoiceRecognition()) return;
    voiceActive = true;
    voiceRecognition.start();
    btn.classList.add('listening');
    btn.textContent = '🔴';
  } else {
    voiceActive = false;
    voiceRecognition && voiceRecognition.stop();
    btn.classList.remove('listening');
    btn.textContent = '🎤';
  }
}

function stopVoice(){
  if(voiceActive){ voiceActive=false; voiceRecognition&&voiceRecognition.stop(); }
  const btn = document.getElementById('micBtn');
  if(btn){ btn.classList.remove('listening'); btn.textContent='🎤'; }
}

function startTimer(){
  startTime = Date.now();
  stopTimer();
  timerInterval = setInterval(()=>{
    const sec = Math.floor((Date.now()-startTime)/1000);
    const mm = String(Math.floor(sec/60)).padStart(2,'0');
    const ss = String(sec%60).padStart(2,'0');
    document.getElementById('timerVal').textContent = mm+':'+ss;
  }, 250);
}
function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
}

function getSpeakText(el){
  if(el.dataset.type === 'en') return el.dataset.speakText || el.dataset.text;
  // zh card: respect visibility toggles
  const showZh = window._showZh !== false;
  const showPh = window._showPh !== false;
  if(showZh && showPh) return el.dataset.speakText || el.dataset.text;
  if(showZh && !showPh) return el.dataset.speakText || el.dataset.text;
  if(!showZh && showPh) return el.dataset.ph || '';
  return ''; // both hidden, nothing to speak
}

function onCardClick(e){
  if(locked) return;
  const el = e.currentTarget;
  if(el.classList.contains('cleared')) return;

  // Tapping the already-selected card → stop speaking and deselect
  if(el.classList.contains('selected') && el === firstPick){
    stopRepeatSpeak();
    window.speechSynthesis && window.speechSynthesis.cancel();
    el.classList.remove('selected');
    firstPick = null;
    return;
  }

  if(!firstPick){
    const lang = el.dataset.type === 'en' ? 'en-US' : 'zh-TW';
    const txt = getSpeakText(el);
    if(txt) speak(txt, lang);
    firstPick = el;
    el.classList.add('selected');
    if(txt) startRepeatSpeak(el, lang);
    return;
  }

  if(firstPick === el) return;

  // same type → swap selection
  if(firstPick.dataset.type === el.dataset.type){
    stopRepeatSpeak();
    const lang = el.dataset.type === 'en' ? 'en-US' : 'zh-TW';
    const txt = getSpeakText(el);
    if(txt) speak(txt, lang);
    firstPick.classList.remove('selected');
    firstPick = el;
    el.classList.add('selected');
    if(txt) startRepeatSpeak(el, lang);
    return;
  }

  stopRepeatSpeak();
  locked = true;
  const isMatch = firstPick.dataset.pair === el.dataset.pair;

  if(isMatch){
    firstPick.classList.add('correct');
    el.classList.add('correct');
    matchedCount++;
    document.getElementById('matchedVal').textContent = matchedCount;

    const enEl = firstPick.dataset.type === 'en' ? firstPick : el;
    const zhEl = firstPick.dataset.type === 'en' ? el : firstPick;
    const enTxt = enEl.dataset.speakText || enEl.dataset.text;
    const zhTxt = getSpeakText(zhEl);
    speak(enTxt, 'en-US', {
      interrupt:false,
      onEnd: ()=>{ if(zhTxt) speak(zhTxt, 'zh-TW', {interrupt:false}); }
    });

    setTimeout(()=>{
      firstPick.classList.add('cleared');
      el.classList.add('cleared');
      firstPick.classList.remove('selected','correct');
      el.classList.remove('selected','correct');
      const goneA = firstPick, goneB = el;
      firstPick = null;
      locked = false;
      checkComplete();
      setTimeout(()=>{ goneA.remove(); goneB.remove(); }, 380);
    }, 380);
  } else {
    wrongCount++;
    document.getElementById('missVal').textContent = wrongCount;
    // Record correct pair for the JUST-PRESSED card (el)
    const correctData = pairDataMap[el.dataset.pair];
    if(correctData) wrongWords.add(correctData.en + ' | ' + correctData.zh);
    firstPick.classList.add('wrong');
    el.classList.add('wrong');
    playBeep();
    const lang1 = firstPick.dataset.type === 'en' ? 'en-US' : 'zh-TW';
    const txt1 = getSpeakText(firstPick);
    if(txt1) setTimeout(()=>{ speak(txt1, lang1); }, 350);
    setTimeout(()=>{
      firstPick.classList.remove('wrong');
      el.classList.remove('wrong');
    }, 500);
    setTimeout(()=>{
      firstPick.classList.remove('selected');
      firstPick = null;
      locked = false;
    }, 1100);
  }
}

function showResults(){
  stopTimer();
  stopRepeatSpeak();
  const sec = startTime ? Math.floor((Date.now()-startTime)/1000) : 0;
  const mm = String(Math.floor(sec/60)).padStart(2,'0');
  const ss = String(sec%60).padStart(2,'0');
  document.getElementById('rTime').textContent = mm+':'+ss;
  document.getElementById('rCount').textContent = matchedCount;
  document.getElementById('rMiss').textContent = wrongCount;

  const section = document.getElementById('wrongWordsSection');
  const list = document.getElementById('wrongWordsList');
  if(wrongWords.size > 0){
    section.style.display = 'block';
    list.innerHTML = Array.from(wrongWords).map(w=>w).join('<br>');
  } else {
    section.style.display = 'none';
  }

  modalBg.classList.add('active');
}

document.getElementById('copyWrongBtn').addEventListener('click', ()=>{
  const text = Array.from(wrongWords).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copyWrongBtn');
    btn.textContent = '✅ 已複製！';
    setTimeout(()=>{ btn.textContent = '📋 複製到剪貼簿'; }, 2000);
  }).catch(()=>{
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyWrongBtn');
    btn.textContent = '✅ 已複製！';
    setTimeout(()=>{ btn.textContent = '📋 複製到剪貼簿'; }, 2000);
  });
});

function checkComplete(){
  if(matchedCount === pairs.length){
    setTimeout(()=>{ showResults(); }, 250);
  }
}
