<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻譯與搜尋工具</title>
<style>
    body { font-family: sans-serif; background: #f5f0e8; margin: 0; padding: 5px; height: 100vh; overflow: hidden; }
    .container { display: flex; flex-direction: column; height: 100%; gap: 5px; }
    
    textarea, #result { 
        width: 100%; flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; 
        font-size: 16px; box-sizing: border-box; resize: none; text-align: left;
        white-space: pre-wrap; word-wrap: break-word; 
    }
    #result { background: #e3f9ee; overflow-y: auto; transition: border-color 0.3s; }
    
    /* 調整為 6 格以容納新按鈕 */
    .btn-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
    
    button, select { 
        height: 40px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc;
        font-size: 16px; background: #eee; display: flex; align-items: center; justify-content: center;
    }
    select { appearance: none; text-align-last: center; }

    @keyframes blink-red { 50% { border-color: #e0654f; box-shadow: 0 0 8px #e0654f; } }
    .recording { animation: blink-red 1s infinite; }

    @keyframes blink-green { 50% { border-color: #4caf50; box-shadow: 0 0 8px #4caf50; } }
    .translating { animation: blink-green 1s infinite; }
</style>
</head>
<body>

<div class="container">
    <textarea id="input" placeholder="請輸入文字"></textarea>
    
    <div class="btn-row">
        <button onclick="adjustFontSize(-1)">-</button>
        <select id="srcLang" onchange="saveLang('src', this.value)">
            <option value="zh-TW">中</option><option value="ja">日</option>
            <option value="ko">韓</option><option value="en">英</option><option value="ta">坦</option>
        </select>
        <button onclick="translateText()">🔄</button>
        <!-- 新增搜尋按鈕 -->
        <button onclick="searchWeb()">🔍</button>
        <select id="tgtLang" onchange="saveLang('tgt', this.value)">
            <option value="en">英</option><option value="zh-TW">中</option>
            <option value="ja">日</option><option value="ko">韓</option><option value="ta">坦</option>
        </select>
        <button onclick="adjustFontSize(1)">+</button>
    </div>

    <div class="btn-row" style="grid-template-columns: repeat(4, 1fr);">
        <button onclick="startDictation()">🎤</button>
        <button onclick="clearInput()">🧹</button>
        <button onclick="copyResult()">📋</button>
        <button onclick="speakText()">🔊</button>
    </div>
    
    <div id="result">翻譯結果...</div>
</div>

<script>
    const inputArea = document.getElementById('input');
    const resultArea = document.getElementById('result');

    window.onload = () => {
        document.getElementById('srcLang').value = localStorage.getItem('srcLang') || 'zh-TW';
        document.getElementById('tgtLang').value = localStorage.getItem('tgtLang') || 'en';
    };

    function saveLang(type, val) { localStorage.setItem(type + 'Lang', val); }

    // 新增搜尋功能的函式
    function searchWeb() {
        const text = inputArea.value.trim();
        if (!text) return;
        
        // 在結果框顯示狀態
        resultArea.textContent = `正在搜尋: ${text}...`;
        
        // 開啟 Google 搜尋新視窗
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(text)}`;
        window.open(searchUrl, '_blank');
    }

    function startDictation() {
        const lang = document.getElementById('srcLang').value;
        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.lang = lang;
        recognition.onstart = () => { inputArea.classList.add('recording'); };
        recognition.onend = () => { inputArea.classList.remove('recording'); };
        recognition.start();
        recognition.onresult = (e) => { inputArea.value += e.results[0][0].transcript; };
    }

    async function translateText() {
        const text = inputArea.value.trim();
        if (!text) return;
        
        const sl = document.getElementById('srcLang').value;
        const tl = document.getElementById('tgtLang').value;
        
        resultArea.classList.add('translating');
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);
            const data = await res.json();
            
            let fullTranslation = "";
            data[0].forEach(item => {
                if (item[0]) fullTranslation += item[0];
            });
            resultArea.textContent = fullTranslation;
            
        } catch(e) { 
            resultArea.textContent = "翻譯失敗"; 
        } finally {
            resultArea.classList.remove('translating');
        }
    }

    function clearInput() { inputArea.value = ''; resultArea.textContent = '翻譯結果...'; }
    
    function copyResult() { navigator.clipboard.writeText(resultArea.textContent); }

    function adjustFontSize(dir) {
        const newSize = Math.max(12, parseInt(window.getComputedStyle(inputArea).fontSize) + (dir * 2)) + 'px';
        inputArea.style.fontSize = newSize;
        resultArea.style.fontSize = newSize;
    }

    function speakText() { 
        const u = new SpeechSynthesisUtterance(resultArea.textContent);
        u.lang = document.getElementById('tgtLang').value;
        window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
